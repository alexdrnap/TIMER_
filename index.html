<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TIMER_</title>
<meta name="theme-color" content="#0e0f12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TIMER_">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#0e0f12; --panel:#16181d; --panel2:#1b1e25; --line:#24272e;
    --ink:#d7dae0; --dim:#7d838f; --faint:#4a4f59;
    --l1:#4a9fe0;   /* level 1 - daily anchor (blue) */
    --l2:#e8c93a;   /* level 2 - scheduled (yellow) */
    --l3:#8a8f9a;   /* level 3 - quick/volatile (grey) */
    --green:#4bbf7a; --danger:#d9534f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:13px;line-height:1.35}
  body{padding-bottom:40px}
  button{font-family:inherit;font-size:12px;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:5px;padding:5px 8px;cursor:pointer}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.35;cursor:default}
  input,textarea,select{font-family:inherit;font-size:12px;color:var(--ink);
    background:#101217;border:1px solid var(--line);border-radius:5px;padding:2px 5px}
  input:focus,textarea:focus{outline:1px solid var(--l2);border-color:var(--l2)}
  .mut{color:var(--dim)}

  #top{position:sticky;top:0;z-index:30;background:var(--bg)}
  header{background:var(--bg);border-bottom:1px solid var(--line);
    padding:4px 6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:1px;font-size:15px}
  .brand b{color:var(--l1)}
  .hbtns{display:flex;gap:9px;flex-wrap:wrap;margin-left:auto;align-items:center}
  .hgroup{display:inline-flex;gap:3px;align-items:center;padding:2px 4px;border-radius:7px;background:#0e1015;border:1px solid var(--line)}
  .conn{color:var(--dim);font-size:11px}.conn.ok{color:var(--green)}
  .clight{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:5px;vertical-align:middle;box-shadow:0 0 4px var(--danger)}
  #btnConnect.ok .clight{background:var(--green);box-shadow:0 0 5px var(--green)}
  .add{color:var(--green);border-color:#2c4a38}
  .del{color:var(--danger);border-color:#4a2c2c}.del.on{background:#33191a;color:#ffb4b1}
  #btnLvl.on{background:#0f1620;color:var(--ink);outline:1px solid var(--l2)}

  .tabs{display:flex;gap:3px;padding:2px 6px 0;overflow-x:auto;border-bottom:1px solid var(--line)}
  .tab{flex:0 0 auto;padding:3px 9px;border:1px solid var(--line);border-bottom:none;border-radius:6px 6px 0 0;
    background:var(--panel);color:var(--dim);font-size:12px;position:relative;top:1px;white-space:nowrap;opacity:.7}
  .tab.active{background:var(--panel2);color:var(--ink);opacity:1;font-weight:700;
    border-color:var(--l1);border-top-width:2px;box-shadow:0 -2px 6px rgba(74,159,224,.25);top:0}
  .tab.active small{color:var(--ink)}
  .tab small{display:block;font-size:9px;color:var(--faint)}
  .tab.today small{color:var(--l1)}

  .subbar{display:flex;align-items:center;gap:8px;padding:3px 6px}
  .subbar .next{color:var(--l1);border-color:#4a3a1c;padding:3px 8px}
  .count{color:var(--dim);font-size:11px}
  .tickctl{margin-left:auto;display:flex;align-items:center;gap:3px;font-size:11px;color:var(--dim)}
  .tickctl input{width:15px;height:15px;accent-color:var(--l2)}
  .tickvol{padding:1px 3px;font-size:11px}

  #list{padding:1px 6px 40px}
  .grp{margin:3px 0 1px;font-size:10px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;
    display:flex;align-items:center;gap:6px}
  .grp .dot{width:7px;height:7px;border-radius:2px}
  .grp.l1 .dot{background:var(--l1)} .grp.l2 .dot{background:var(--l2)} .grp.l3 .dot{background:var(--l3)}
  .grp.sched .dot{background:#7fbfff} .grp.unsched .dot{background:#666}
  .grp.sched,.grp.unsched{font-size:11px;color:var(--dim)}
  .grp.sub{margin-left:10px;font-size:9px;opacity:.8}
  .task{touch-action:pan-y}
  .task.armdel{outline:1px solid var(--danger)} .task.armlvl{outline:1px solid var(--l1)}
  .ldot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:5px;vertical-align:middle}

  .task{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:1px 4px;margin:1px 0;position:relative;overflow:hidden}
  .task.l1{--acc:var(--l1)} .task.l2{--acc:var(--l2)} .task.l3{--acc:var(--l3)}
  .task.l1{border-left:3px solid var(--l1)} .task.l2{border-left:3px solid var(--l2)} .task.l3{border-left:3px solid var(--l3)}
  .task.done{opacity:.55}
  .task.dragging,.branch.dragging{outline:1px dashed var(--acc,var(--l2));opacity:.85;background:#12202b}
  #list.dragging{touch-action:none;user-select:none}
  .row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
  .txt{flex:1 1 40px;min-width:24px}
  .txt input{width:100%;border:1px solid var(--line);border-radius:4px;padding:1px 3px;-webkit-user-select:none;-webkit-touch-callout:none;
    background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .task.l1 .txt input{color:#a9d3f2} .task.l2 .txt input{color:#f0e29a} .task.l3 .txt input{color:#c3c7cf}   /* lighter level nuance */
  .task.done .txt input,.branch.done .txt input{text-decoration:line-through}
  .ck{flex:0 0 auto;width:16px;height:16px;accent-color:var(--acc,var(--green))}
  .exp{flex:0 0 auto;width:15px;height:22px;padding:0;border:none;background:transparent;color:var(--acc,var(--dim));font-size:11px}
  .play{flex:0 0 auto;width:26px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--acc,var(--l2));border-color:var(--acc,#243b4d);font-size:12px;padding:0}
  .play.running{color:var(--bg);background:var(--acc,var(--l2));border-color:var(--acc,var(--l2));animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.5}}
  .elapsed{flex:0 0 auto;font-variant-numeric:tabular-nums;color:var(--acc,var(--l2));font-size:11px;text-align:right}
  .elapsed.alarm{animation:pulse .6s infinite}
  .elapsed.paused{opacity:.5}
  .note,.rst{color:var(--acc,var(--dim))}
  .hr{flex:0 0 auto;width:84px;padding:1px 2px}
  .dur{flex:0 0 auto;width:36px;text-align:center;padding:1px 2px;background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .pick{position:relative;flex:0 0 auto;display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:4px;overflow:hidden;
    background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .pick .lbl{padding:1px 4px;font-size:12px;color:var(--ink);white-space:nowrap;pointer-events:none;text-align:center;width:100%}
  .pick input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;padding:0;margin:0}
  .dtpick{width:58px} .hrpick{width:48px}
  .carry{flex:0 0 auto;width:15px;height:15px;border-radius:50%;background:var(--danger);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .spec{flex:0 0 auto;font-size:8px;letter-spacing:-.2px;color:var(--acc,var(--l3));background:#12202b;border:1px solid var(--line);border-radius:3px;padding:0 2px;max-width:82px;overflow:hidden;white-space:nowrap;line-height:15px}
  .wdpick{display:flex;gap:4px;margin:8px 0;flex-wrap:wrap}
  .wdpick .wd{flex:1;min-width:34px;padding:8px 0;color:var(--dim)}
  .wdpick .wd.on{background:var(--l3);color:var(--bg);border-color:var(--l3)}
  .modesw.rp button.sel{background:var(--l2);color:var(--bg);box-shadow:none}
  .modesw.win button{padding:5px 11px;font-size:12px}
  .modesw.win button.sel{background:var(--l3);color:var(--bg);box-shadow:none}
  #btnSkip{color:var(--danger);border-color:#4a2c2c}
  .skrow{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line)}
  .sklvl{flex:0 0 auto;width:20px;text-align:center;font-weight:700}
  .sklvl.lv1{color:var(--l1)} .sklvl.lv2{color:var(--l2)} .sklvl.lv3{color:var(--l3)}
  .skt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .skd{flex:0 0 auto;font-size:10px;color:var(--faint)}
  .note{flex:0 0 auto;width:24px;height:22px;padding:0;color:var(--dim);font-size:12px}
  .note.has{color:var(--l1);border-color:#4a3a1c}
  .brc{flex:0 0 auto;width:26px;height:22px;padding:0;color:var(--dim);font-size:11px}
  .rst{flex:0 0 auto;width:24px;height:22px;padding:0;color:var(--dim);font-size:13px}
  .xdel{flex:0 0 auto;width:24px;height:22px;padding:0;color:var(--danger);font-size:12px}
  .lvlpick{flex:0 0 auto;display:flex;gap:2px}
  .lp{width:20px;height:22px;padding:0;font-size:11px;color:var(--dim)}
  .lp1.on{color:var(--bg);background:var(--l1);border-color:var(--l1)}
  .lp2.on{color:var(--bg);background:var(--l2);border-color:var(--l2)}
  .lp3.on{color:var(--bg);background:var(--l3);border-color:var(--l3)}
  .grip{flex:0 0 auto;margin-left:auto;width:34px;height:24px;display:flex;align-items:center;justify-content:center;
    color:var(--l2);font-size:16px;cursor:grab;touch-action:none;border:1px solid #243b4d;border-radius:5px;background:#12202b}
  .task.frozen,.branch.frozen{opacity:.72}
  .task.frozen input,.task.frozen button,.branch.frozen input,.branch.frozen button{pointer-events:none}
  .frozenbar{background:#241a10;border:1px solid #4a3a1c;color:var(--l1);border-radius:6px;padding:3px 8px;font-size:11px;margin:2px 0}
  #btnMove.on{background:#12202b;color:var(--l2);outline:1px solid var(--l2)}
  #btnPrevWk,#btnNextWk,#btnHome{width:24px;padding:0;color:var(--dim)}
  .np{cursor:pointer} .skrow .skt,.skrow .sklvl{cursor:pointer}
  .np{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line)}
  .np.npl1 .h{color:#a9d3f2} .np.npl2 .h{color:#f0e29a} .np.npl3 .h{color:#c3c7cf}
  .np .h{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .np-l{flex:0 0 auto;width:20px;text-align:center;font-size:10px;font-weight:700}
  .np-l.lv1{color:var(--l1)} .np-l.lv2{color:var(--l2)} .np-l.lv3{color:var(--l3)}
  .tag{font-size:10px;border-radius:4px;padding:0 4px}
  .tag.over{color:#ff9b96;border:1px solid #5a2f2c}
  .empty{color:var(--faint);text-align:center;padding:24px 10px;font-size:12px}
  .dmy{width:104px;text-align:center}
  .branches{margin:1px 0 1px 12px;border-left:1px dashed var(--line);padding-left:6px}
  .branch{display:flex;flex-wrap:nowrap;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 4px;margin:1px 0;overflow:hidden}
  .branch.done{opacity:.55}
  .branch .txt input{width:100%;border:1px solid var(--line);border-radius:4px;padding:1px 3px;
    background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .branch.done .txt input{text-decoration:line-through;color:var(--dim)}
  .pmenu{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:5px;box-shadow:0 6px 18px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:4px;min-width:150px}
  .pmenu .ph{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;padding:2px 4px}
  .pmenu button{text-align:left}
  .pmenu .p1{border-left:3px solid var(--l1)} .pmenu .p2{border-left:3px solid var(--l2)} .pmenu .p3{border-left:3px solid var(--l3)}
  .pmenu .sel{background:#0f1620;outline:1px solid var(--l2)}
  .pmenu #pmDate{margin:2px 0}
  .pmenu #pmClose{margin-top:4px;color:var(--dim)}
  #toast{position:fixed;left:50%;bottom:58px;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--line);color:var(--ink);padding:7px 12px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:70;white-space:nowrap}
  #toast.on{opacity:1}
  .l1row{display:flex;justify-content:space-between;align-items:center;gap:8px;border-bottom:1px solid var(--line);padding:5px 2px}
  .l1t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
  .l1w{display:flex;align-items:center;gap:3px;flex:0 0 auto}
  .wd{width:9px;height:9px;border-radius:2px;background:#2a2e36;display:inline-block}
  .wd.on{background:var(--l1)} .wd.td{outline:1px solid var(--l2);outline-offset:1px}
  .l1c{font-size:11px;color:var(--dim);margin-left:5px;font-variant-numeric:tabular-nums} .l1c.ok{color:var(--green)}
  .l1o{font-size:11px;color:var(--l2);margin-left:6px;min-width:32px;text-align:right}
  .l1s{font-size:11px;color:var(--dim);margin-left:6px}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;align-items:flex-start;justify-content:center;padding:26px 10px;overflow:auto}
  .modal.on{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:10px;width:100%;max-width:460px;padding:12px}
  .sheet h3{margin:0 0 8px;font-size:14px;letter-spacing:.5px}
  .sheet h3 .x{float:right}
  .addbtn{display:flex;gap:8px;flex-direction:column}
  .addbtn button{text-align:left;padding:10px;font-size:13px}
  .addbtn .k{font-weight:700} .addbtn .d{color:var(--dim);font-size:11px}
  .a1{border-left:3px solid var(--l1)} .a2{border-left:3px solid var(--l2)} .a3{border-left:3px solid var(--l3)}
  .logrow{border:1px solid var(--line);border-radius:6px;padding:7px 8px;margin:6px 0;background:var(--panel2);cursor:pointer}
  .logrow .when{color:var(--dim);font-size:11px}
  .logrow .lv{float:right;font-size:10px}
  .lv1{color:var(--l1)} .lv2{color:var(--l2)} .lv3{color:var(--l3)}
  .logdetail{white-space:pre-wrap;background:#101217;border:1px solid var(--line);border-radius:6px;padding:8px;margin-top:6px;font-size:12px}
  .stat{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 2px}
  .stat b{font-variant-numeric:tabular-nums}
  .lvhead{margin:12px 2px 4px;font-size:11px;letter-spacing:.5px}
  .bars{display:flex;align-items:flex-end;gap:4px;height:76px;margin:10px 2px 4px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;justify-content:flex-end;height:100%}
  .bar .b{width:100%;border-radius:3px 3px 0 0;min-height:2px;background:var(--l2)}
  .bar .l,.bar .v{font-size:9px;color:var(--dim)}
  .np{border:1px solid var(--line);border-radius:6px;padding:7px 8px;margin:6px 0;background:var(--panel2)}
  .np .h{color:var(--l2)}
  .note-in{width:100%;min-height:80px;margin-top:6px}
  .recrow{display:flex;align-items:center;gap:8px;margin-top:8px}
  .recrow #recBtn.recon{background:#33191a;color:#ffb4b1;border-color:#5a2f2c}
  .modesw{display:flex;margin:2px 0;border:1px solid var(--line);border-radius:6px;overflow:hidden;width:fit-content}
  .modesw button{border:none;border-radius:0;background:var(--panel2);color:var(--dim);padding:6px 14px}
  .modesw button.sel{background:#0f1620;color:var(--ink);box-shadow:inset 0 -2px 0 var(--l2)}
  .del{color:var(--danger);border-color:#4a2c2c}
  .mbtns{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
  .prime{color:var(--green);border-color:#2c4a38}
  .hint{font-size:11px;color:var(--faint);margin-top:8px}
</style>
</head>
<body>

<div id="top">
<header>
  <div class="brand">TIMER<b>_</b> <span id="ver" style="font-size:10px;color:var(--dim);font-weight:400"></span></div>
  <div class="hbtns">
    <span class="hgroup">
      <button id="btnAdd" class="add">＋ task</button>
      <button id="btnUndo" title="undo">↶</button>
      <button id="btnRedo" title="redo">↷</button>
    </span>
    <span class="hgroup" title="swipe a task ← to delete, → to set level">
      <button id="btnMove" title="move / reorder tasks">⠿</button>
    </span>
    <span class="hgroup">
      <button id="btnLog">▤ log</button>
      <button id="btnStats">mode_switch</button>
    </span>
    <span class="hgroup">
      <button id="btnMore" title="data & sound">⋯</button>
      <button id="btnConnect"><span class="clight"></span><span id="connlbl">connect</span></button>
      <button id="btnReload" title="reload">⟳</button>
    </span>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="subbar">
  <button id="btnPrevWk" title="previous week">‹</button>
  <button id="btnHome" title="back to today">⌂</button>
  <button id="btnNextWk" title="next week">›</button>
  <button class="next" id="btnNext">next ▸ future</button>
  <button class="next" id="btnSkip" title="skipped tasks">≠ 0</button>
  <span class="count" id="count"></span>
  <label class="tickctl" title="per-second tick while a task runs">tick<input type="checkbox" id="tickChk"></label>
  <select id="tickVol" class="tickvol" title="tick volume">
    <option value="0">vol 1</option><option value="1">vol 2</option><option value="2">vol 3</option><option value="3">vol 4</option>
  </select>
</div>
</div>

<div id="list"></div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
"use strict";
/* ---------- constants ---------- */
const DAYLABEL=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const ONTIME_TOL=5;
const L1_TARGET=5;                       // level-1 days/week goal
const TASKS_CSV="tasks.csv", EVENTS_CSV="events.csv", NOTES_CSV="notes.csv", SETTINGS_CSV="settings.csv", GCAL_CSV="google_L2_import.csv", PRESET_CSV="l1_presets.csv", ARCHIVE_CSV="discipline_archive.csv";
const SOUND_FILE="timer_sound.wav", BOM="\uFEFF";

/* ---------- state ---------- */
let dbDir=null,timerDir=null;
let tasks=[],events=[],notes=[],presets=[],archives=[];
let settings={mode:"experiment",tickOn:false,tickVol:1,lastRoll_experiment:"",lastRoll_discipline:"",gcalClient:"",discStart:""};
let currentDay=jsDayToIdx(new Date().getDay());
let moveMode=false, weekOffset=0;
let armed=null;                          // {id, type:"del"|"lvl"} — the one row currently swipe-armed
const collapsed=new Set();               // task/branch ids whose children are hidden
let dragId=null;
function byOrder(a,b){return (+a.sort)-(+b.sort);}
const DAY_MS=24*3600*1000;                // stats/notes stay editable for 24h, then lock
let audioDir=null;                        // TIMER/audio_logs handle (voice notes)
const timers=new Map();                  // runKey -> {t0,dur,before,paused,iv,playedISO}
let audioEl=null,activeKey=null,audioPrimed=false,customBuf=null,alarmURL=null;

/* ---------- date helpers ---------- */
function jsDayToIdx(d){return (d+6)%7;}                       // Sun=0 -> Mon=0
function ymd(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function todayStr(){return ymd(new Date());}
function nowHM(){return new Date().toTimeString().slice(0,5);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function weekDates(off){off=off||0;const d=new Date();const idx=jsDayToIdx(d.getDay());const mon=new Date(d);mon.setDate(d.getDate()-idx+off*7);
  const out=[];for(let i=0;i<7;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);out.push(ymd(x));}return out;}
function weekdayIdxOf(dateStr){return jsDayToIdx(new Date(dateStr+"T00:00").getDay());}
const WD_SHORT=["M","Tu","W","Th","F","Sa","Su"];                 // Mon-indexed
function repDays(t){return (t.repeat||"").split(",").filter(x=>x!=="").map(Number);}
function occursOn(t,dateStr,wdIdx){                                // does this task have an occurrence on dateStr?
  if(t.skipped==="1")return false;
  if(t.level==="1")return true;                                   // daily anchor
  if(t.level==="3"){
    if(!t.repeat)return t.date===dateStr;                         // once
    return repDays(t).includes(wdIdx) && (!t.date||t.date<=dateStr);
  }
  if(t.level==="2"){
    if(!t.repeat)return t.date===dateStr;                         // once
    if(dateStr<(t.date||""))return false;
    if(t.repeat==="3d"||t.repeat==="2w"){const iv=t.repeat==="2w"?14:3;return daysBetween(t.date,dateStr)%iv===0;}  // every 3 / 14 days from anchor
    const a=(t.date||"").split("-").map(Number),d=dateStr.split("-").map(Number);
    if(t.repeat==="m"){const occ=Math.min(a[2],daysInMonth(d[0],d[1]));return d[2]===occ;}   // monthly; clamp (31 -> 30/28)
    if(t.repeat==="y"){const occ=Math.min(a[2],daysInMonth(d[0],a[1]));return d[1]===a[1]&&d[2]===occ;}  // yearly; Feb29 -> Feb28
  }
  return false;
}
function repeatSpec(t){                                            // small corner label
  if(t.level==="3"&&t.repeat)return repDays(t).map(i=>WD_SHORT[i]).join("/");
  if(t.level==="2"&&t.repeat)return t.repeat;                      // m / y / 2w / 3d
  return "";
}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}      // m is 1-12
function addDays(iso,n){return ymd(new Date(new Date(iso+"T00:00").getTime()+n*86400000));}
function addMonths(iso,n){const p=iso.split("-").map(Number);let y=p[0],m=p[1]-1+n;y+=Math.floor(m/12);m=((m%12)+12)%12;const day=Math.min(p[2],daysInMonth(y,m+1));return y+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");}
function addYears(iso,n){const p=iso.split("-").map(Number),y=p[0]+n,day=Math.min(p[2],daysInMonth(y,p[1]));return y+"-"+String(p[1]).padStart(2,"0")+"-"+String(day).padStart(2,"0");}
function daysBetween(a,b){return Math.round((new Date(b+"T00:00")-new Date(a+"T00:00"))/86400000);}
function fmtD(iso){if(!iso)return"";const p=iso.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:iso;}   // DD/MM/YYYY
function fmtDM(iso){if(!iso)return"";const p=iso.split("-");return p.length===3?p[2]+"/"+p[1]:iso;}          // DD/MM
function parseDMY(s){s=(s||"").trim();const m=s.match(/^(\d{1,2})[\/.\- ]?(\d{1,2})[\/.\- ]?(\d{2,4})$/);if(!m)return null;
  let d=+m[1],mo=+m[2],y=+m[3];if(y<100)y+=2000;if(mo<1||mo>12||d<1||d>31)return null;
  const dt=new Date(y,mo-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d)return null;return ymd(dt);}

/* ---------- CSV ---------- */
function csvEscape(v){v=(v==null?"":String(v));return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function toCSV(header,rows){let out=header.join(",")+"\n";for(const r of rows)out+=header.map(h=>csvEscape(r[h])).join(",")+"\n";return BOM+out;}
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let f="",row=[],i=0,q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(f);f="";i++;continue;}
    if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(f);rows.push(row);f="";row=[];i++;continue;}
    f+=c;i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  if(!rows.length)return[];const head=rows[0];const objs=[];
  for(let r=1;r<rows.length;r++){if(rows[r].length===1&&rows[r][0]==="")continue;
    const o={};head.forEach((h,k)=>o[h]=rows[r][k]!==undefined?rows[r][k]:"");objs.push(o);}
  return objs;
}

/* ---------- filesystem (desktop: shared folder · phone: private on-device OPFS) ---------- */
const HAS_FSA = !!window.showDirectoryPicker;
function nativeFs(){return window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Filesystem;}
function bufToB64(buf){const b=new Uint8Array(buf);let s="";const c=0x8000;for(let i=0;i<b.length;i+=c)s+=String.fromCharCode.apply(null,b.subarray(i,i+c));return btoa(s);}

async function nRead(name,bin){try{const r=await nativeFs().readFile(bin?{path:"TIMER/"+name,directory:"DATA"}:{path:"TIMER/"+name,directory:"DATA",encoding:"utf8"});return r.data;}catch(e){return null;}}
async function nWrite(name,data,bin){await nativeFs().writeFile(bin?{path:"TIMER/"+name,data,directory:"DATA",recursive:true}:{path:"TIMER/"+name,data,directory:"DATA",encoding:"utf8",recursive:true});}
async function nDelete(name){try{await nativeFs().deleteFile({path:"TIMER/"+name,directory:"DATA"});}catch(e){}}
async function connect(){
  try{
    if(nativeFs()){                                          // Capacitor Filesystem present -> native app storage
      timerDir="native";dbDir="native";
      await loadAll();await loadSound();primeAudio();setConn("connected",true);return;
    }
    if(isNative()){setConn("need fs plugin",false);toast("native app but Filesystem plugin missing");return;}
    if(HAS_FSA){
      dbDir=await window.showDirectoryPicker({id:"database",mode:"readwrite"});
      timerDir=await dbDir.getDirectoryHandle("TIMER",{create:true});
    }else{
      if(!(navigator.storage&&navigator.storage.getDirectory)){setConn("no storage",false);
        alert("This browser can't store files. Update Chrome and try again.");return;}
      const root=await navigator.storage.getDirectory();               // OPFS — works on Chrome for Android
      timerDir=await root.getDirectoryHandle("TIMER",{create:true});
      if(navigator.storage.persist)navigator.storage.persist().catch(()=>{});
    }
    await loadAll();await loadSound();primeAudio();
    setConn("connected",true);
  }catch(e){if(e.name!=="AbortError"){console.error(e);setConn("connect failed",false);}}
}
async function readFile(dir,name){if(dir==="native")return await nRead(name,false);
  try{const h=await dir.getFileHandle(name);return await (await h.getFile()).text();}catch(e){return null;}}
async function writeFile(dir,name,text){if(dir==="native"){await nWrite(name,text,false);return;}
  const h=await dir.getFileHandle(name,{create:true});const w=await h.createWritable();await w.write(text);await w.close();}
async function writeBinary(dir,name,buf){if(dir==="native"){await nWrite(name,bufToB64(buf),true);return;}
  const h=await dir.getFileHandle(name,{create:true});const w=await h.createWritable();await w.write(buf);await w.close();}
async function loadAll(){
  const tt=await readFile(timerDir,TASKS_CSV);tasks=tt?parseCSV(tt).map(normTask):[];
  const et=await readFile(timerDir,EVENTS_CSV);events=et?parseCSV(et):[];
  const nt=await readFile(timerDir,NOTES_CSV);notes=nt?parseCSV(nt):[];
  const pt=await readFile(timerDir,PRESET_CSV);presets=pt?parseCSV(pt):[];
  const at=await readFile(timerDir,ARCHIVE_CSV);archives=at?parseCSV(at):[];
  events.forEach(e=>{if(!e.created)e.created=e.played_at||(e.date?e.date+"T12:00:00":new Date().toISOString());
    if(!e.kind)e.kind="done";if(!e.mode)e.mode="experiment";if(e.timer!=="0"&&e.timer!=="1")e.timer="1";});
  const stx=await readFile(timerDir,SETTINGS_CSV);
  if(stx){const rows=parseCSV(stx),g=k=>{const r=rows.find(x=>x.key===k);return r?r.value:undefined;};
    if(g("mode"))settings.mode=(g("mode")==="discipline")?"discipline":"experiment";
    settings.tickOn=g("tickOn")==="1";

async function saveSettings(){if(timerDir)await writeFile(timerDir,SETTINGS_CSV,toCSV(["key","value"],[
  {key:"mode",value:settings.mode},{key:"tickOn",value:settings.tickOn?"1":"0"},{key:"tickVol",value:String(settings.tickVol)},
  {key:"lastRoll_experiment",value:settings.lastRoll_experiment||""},{key:"lastRoll_discipline",value:settings.lastRoll_discipline||""},

function mutable(ms){return isFinite(ms) && (Date.now()-ms)<DAY_MS;}      // editable within 24h, then permanent
function eventMutable(e){return e&&mutable(Date.parse(e.created||""));}
function noteMutable(n){return n&&mutable(Date.parse((n.date||"")+"T"+(n.time||"00:00:00")));}
function normTask(o){return{id:o.id||uid(),parent:o.parent||"",level:(o.level==="1"||o.level==="2"||o.level==="3")?o.level:(o.parent?"":"3"),
  text:o.text||"",date:o.date||"",hour:o.hour||"",dur:o.dur||"",done:o.done==="1"?"1":"0",acc:o.acc||"0",
  mode:(o.mode==="discipline")?"discipline":"experiment",origin:o.origin||"",
  repeat:o.repeat||"",skipped:o.skipped==="1"?"1":"0",skipStart:o.skipStart||"",skipEnd:o.skipEnd||"",gcal:o.gcal||"",
  sort:o.sort||"0",created:o.created||new Date().toISOString()};}
const TASK_H=["id","parent","level","text","date","hour","dur","done","acc","mode","origin","repeat","skipped","skipStart","skipEnd","gcal","sort","created"];
const EVT_H =["id","task_id","level","date","kind","mode","timer","played_at","elapsed_sec","created"];

async function getAudioDir(){if(!timerDir)return null;if(!audioDir)audioDir=await timerDir.getDirectoryHandle("audio_logs",{create:true});return audioDir;}

/* ---------- sound + media session ----------
   The alarm is baked as ONE media file = [silence for the remaining time] + [5s beep].
   It's played on a real <audio> element at PLAY time, so it keeps playing through a screen
   lock (like a music track) and the beep fires at the end even if JS is frozen in background. */
function getAudio(){if(!audioEl){audioEl=new Audio();audioEl.preload="auto";
    const revive=()=>{const st=timers.get(activeKey);
      if(st&&!st.paused&&!audioEl.ended&&audioEl.currentTime>0)audioEl.play().catch(()=>{});};
    ["pause","stalled","waiting","suspend"].forEach(ev=>audioEl.addEventListener(ev,revive));
  }return audioEl;}
function wav8(rate,samples){                 // 8-bit unsigned mono WAV
  const n=samples.length,buf=new Uint8Array(44+n),dv=new DataView(buf.buffer);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF");dv.setUint32(4,36+n,true);ws(8,"WAVE");ws(12,"fmt ");dv.setUint32(16,16,true);
  dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,rate,true);dv.setUint32(28,rate,true);
  dv.setUint16(32,1,true);dv.setUint16(34,8,true);ws(36,"data");dv.setUint32(40,n,true);
  buf.set(samples,44);return buf;
}
function beepSamples(rate,seconds){          // default pulsed 880Hz beep
  const n=Math.floor(rate*seconds),out=new Uint8Array(n);
  for(let i=0;i<n;i++){const t=i/rate,ph=t%0.5,on=ph<0.3?1:0,
    env=on?Math.min(1,ph/0.02,(0.3-ph)/0.02):0;
    out[i]=128+Math.round(Math.sin(2*Math.PI*880*t)*105*env);}
  return out;
}
async function customBeepSamples(rate,seconds){   // imported timer_sound.wav, looped/cut to 5s
  const n=Math.ceil(rate*seconds),oac=new OfflineAudioContext(1,n,rate);
  const s=oac.createBufferSource();s.buffer=customBuf;s.loop=true;s.connect(oac.destination);s.start(0);s.stop(seconds);
  const ch=(await oac.startRendering()).getChannelData(0),out=new Uint8Array(n);
  for(let i=0;i<n;i++){out[i]=128+Math.round(Math.max(-1,Math.min(1,ch[i]))*120);}
  return out;
}
function silentURL(){const b=wav8(8000,new Uint8Array(800).fill(128));let s="";b.forEach(x=>s+=String.fromCharCode(x));return "data:audio/wav;base64,"+btoa(s);}
async function buildAlarmURL(remaining,beepSecs){
  remaining=Math.max(0,Math.min(remaining,3*3600));
  const rate=remaining>1800?4000:8000,BEEP=beepSecs||5;
  const silN=Math.floor(remaining*rate);
  const beep=customBuf?await customBeepSamples(rate,BEEP):beepSamples(rate,BEEP);
  const data=new Uint8Array(silN+beep.length);
  data.fill(128,0,silN);                       // true silence before the beep (no audible hum)
  data.set(beep,silN);
  return URL.createObjectURL(new Blob([wav8(rate,data)],{type:"audio/wav"}));
}
async function loadSound(){                  // decode imported sound (if any) for the beep
  customBuf=null;let ab=null;
  if(timerDir==="native"){const b64=await nRead(SOUND_FILE,true);if(b64)ab=await b64ToBlob(b64).arrayBuffer();}
  else for(const dir of[timerDir,dbDir]){if(!dir||dir==="native")continue;
    try{ab=await(await(await dir.getFileHandle(SOUND_FILE)).getFile()).arrayBuffer();break;}catch(e){}}
  if(ab){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();customBuf=await ctx.decodeAudioData(ab);if(ctx.close)ctx.close();}catch(e){customBuf=null;}}
}
function primeAudio(){                       // unlock playback on a gesture so the alarm can auto-play later
  if(audioPrimed)return;const a=getAudio();a.src=silentURL();a.muted=true;
  a.play().then(()=>{a.pause();a.currentTime=0;a.muted=false;audioPrimed=true;}).catch(()=>{a.muted=false;});
}
async function armAudio(key,remaining){
  const url=await buildAlarmURL(remaining);
  if(!timers.has(key)){URL.revokeObjectURL(url);return;}   // finished before it was ready
  if(alarmURL)URL.revokeObjectURL(alarmURL);alarmURL=url;
  const a=getAudio();a.loop=false;a.muted=false;a.src=url;a.currentTime=0;a.play().catch(()=>{});
  activeKey=key;setupMedia(key);
}
function stopAudio(key){
  if(key&&key!==activeKey)return;const a=getAudio();a.pause();a.currentTime=0;activeKey=null;clearMedia();
  if(alarmURL){URL.revokeObjectURL(alarmURL);alarmURL=null;}
}
function setupMedia(key){
  if(!("mediaSession" in navigator))return;
  const id=key.split("|")[0],t=byId(id);if(!t)return;
  try{navigator.mediaSession.metadata=new MediaMetadata({
    title:t.text||"task",artist:"TIMER_",album:t.parent?"branch":"level "+t.level});}catch(e){}
  navigator.mediaSession.playbackState="playing";
  const H=(a,fn)=>{try{navigator.mediaSession.setActionHandler(a,fn);}catch(e){}};
  H("play",()=>togglePause(key));H("pause",()=>togglePause(key));    // one button, pause/resume in place
  ["stop","nexttrack","previoustrack","seekbackward","seekforward","seekto"].forEach(a=>H(a,null));
}
function clearMedia(){if(!("mediaSession" in navigator))return;navigator.mediaSession.playbackState="none";
  ["play","pause","stop","nexttrack","previoustrack"].forEach(a=>{try{navigator.mediaSession.setActionHandler(a,null);}catch(e){}});}

/* ---------- timer ---------- */
function runKey(id,date){return id+"|"+date;}
function playAllowed(t,date){                       // can't start before the scheduled hour
  if(date==="b")return true;                        // branches have no schedule
  const today=todayStr();
  if(!t.hour)return date<=today;                    // no hour set -> allowed today/past
  if(date>today)return false;
  if(date<today)return true;                        // overdue -> allowed (doing it late)
  return nowHM()>=t.hour;                           // same day -> only at/after the hour
}
function play(id,date){
  const t=byId(id);if(!t)return;const key=runKey(id,date);if(timers.has(key))return;
  if(!playAllowed(t,date)){toast("starts at "+t.hour);return;}
  primeAudio();ensureTick();
  const dur=(parseFloat(t.dur)||0)*60;
  const before = dur>0 ? 0 : (parseFloat(t.acc)||0);       // stopwatch continues from stored time
  const st={t0:Date.now(),dur,before,paused:false,iv:null,playedISO:new Date().toISOString()};
  st.iv=setInterval(()=>tick(key,st),250);timers.set(key,st);
  ensureNotifPerm();                     // (gesture) so locked-screen alerts can fire
  render();updateKeepAlive();
}
function elapsedOf(st){let e=st.before+(st.paused?0:(Date.now()-st.t0)/1000);
  if(st.dur>0&&e>=st.dur)e=st.dur;                    // timer never counts past its duration
  return Math.floor(e);}
function fmtElapsed(st){const el=elapsedOf(st);
  if(st.dur>0)return el<st.dur?"-"+mmss(st.dur-el):"00:00";   // stops at 00:00, no positive count
  return mmss(el);}
function togglePause(key){
  const st=timers.get(key);if(!st)return;
  if(st.paused){                                   // resume
    st.t0=Date.now();st.paused=false;st.iv=setInterval(()=>tick(key,st),250);
  }else{                                           // pause (in place, no rewind)
    st.before+=(Date.now()-st.t0)/1000;st.paused=true;clearInterval(st.iv);st.iv=null;
    if(st.dur<=0){const t=byId(key.split("|")[0]);if(t){t.acc=String(Math.floor(st.before));saveTasks();}}   // stopwatch: store running total
  }
  render();updateKeepAlive();
}
function tick(key,st){
  if(st.dur>0 && !st.ended && (st.before+(Date.now()-st.t0)/1000)>=st.dur){    // reached the end
    st.ended=true;clearInterval(st.iv);st.iv=null;
    const t=byId(key.split("|")[0]);
    ringBell(5,BEEP_VIBE);                                                    // foreground: 5s beep + beep-rhythm buzz
    notifyAlert("⏰ time's up","done: "+((t&&t.text)||"task"),BEEP_VIBE);      // locked/background: OS sound + vibration
    render();updateKeepAlive();return;
  }
  const disp=document.querySelector(`.elapsed[data-run="${key}"]`);
  if(disp){disp.textContent=fmtElapsed(st);disp.classList.toggle("alarm",st.dur>0&&elapsedOf(st)>=st.dur);}
}
function mmss(s){s=Math.max(0,Math.floor(s));return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

/* ---------- done / events (per-mode datasets) ---------- */
function eventFor(id,date){return events.find(e=>e.task_id===id&&e.date===date&&e.kind==="done"&&e.mode===settings.mode);}
function missFor(id,date){return events.find(e=>e.task_id===id&&e.date===date&&e.kind==="miss"&&e.mode===settings.mode);}
function isTimerTask(t){return (parseFloat(t.dur)||0)>0;}
function markDone(id,date){
  const t=byId(id);if(!t)return;const key=runKey(id,date);const st=timers.get(key);
  if(st){clearInterval(st.iv);timers.delete(key);}
  stopAudio(key);
  const played=st?st.playedISO:"";const elapsed=st?elapsedOf(st):0;
  if(!isTimerTask(t)&&st){t.acc=String(elapsed);saveTasks();}          // stopwatch: keep the counted time
  // if a miss was recorded for this occurrence in this mode, clear it (now it's done)
  const m=missFor(id,date);if(m)events=events.filter(e=>e!==m);
  if(!eventFor(id,date)){
    events.push({id:uid(),task_id:id,level:t.level,date,kind:"done",mode:settings.mode,
      timer:isTimerTask(t)?"1":"0",played_at:played,elapsed_sec:String(elapsed),created:new Date().toISOString()});
  }
  saveEvents();render();
}
function undone(id,date){
  const ev=eventFor(id,date);
  if(ev&&!eventMutable(ev))return false;                    // locked permanent after 24h
  if(ev){events=events.filter(e=>e!==ev);saveEvents();}
  render();return true;
}
function missEvent(t,date){return {id:uid(),task_id:t.id,level:t.level,date,kind:"miss",mode:settings.mode,timer:"1",played_at:"",elapsed_sec:"0",created:new Date().toISOString()};}
function copyForward(t,date,origin){       // copy an unchecked task onto the new day
  tasks.push(normTask({id:uid(),level:t.level,text:t.text,date,hour:t.hour,dur:t.dur,mode:t.mode,origin,sort:t.sort}));
}
function rollover(){                          // new day: unchecked tasks get COPIED to the new day (originals stay); the miss stays on the old day
  const today=todayStr(),cur=settings.mode,key="lastRoll_"+cur,last=settings[key];
  let evCh=false,tCh=false;
  if(last&&last<today){
    let d=new Date(last+"T00:00");
    while(true){const ds=ymd(d);if(ds>=today)break;
      const nd=new Date(d);nd.setDate(nd.getDate()+1);const nds=ymd(nd);
      tasks.filter(t=>t.mode===cur&&t.level!=="1"&&!t.repeat&&t.date===ds).forEach(t=>{
        if(!eventFor(t.id,ds)){                                       // unchecked that day
          if(!missFor(t.id,ds)){events.push(missEvent(t,ds));evCh=true;}
          const org=t.origin||t.id;
          if(!tasks.some(x=>x.origin===org&&x.date===nds)){copyForward(t,nds,org);tCh=true;}   // carry a copy forward
        }
      });
      tasks.filter(t=>t.level==="1"&&t.mode===cur).forEach(t=>{if(!eventFor(t.id,ds)&&!missFor(t.id,ds)){events.push(missEvent(t,ds));evCh=true;}});

function nextDay(iso){const d=new Date(iso+"T00:00");d.setDate(d.getDate()+1);return ymd(d);}
function catchUp(){    // any past-dated, undone ONCE task chains forward to today: a miss on each passed day + a carried copy (with the ! marker)
  const today=todayStr(),cur=settings.mode;let evCh=false,tCh=false,guard=0,changed=true;
  while(changed&&guard++<400){changed=false;
    tasks.filter(t=>t.mode===cur&&t.level!=="1"&&!t.repeat&&t.date&&t.date<today).forEach(t=>{
      if(eventFor(t.id,t.date))return;                        // done on that day -> stop the chain

      const org=t.origin||t.id,nd=nextDay(t.date);

function accrueRecurring(){   // recurring L2/L3: miss on passed unchecked occurrences (from import day on); skip only if a full cycle passes AFTER import
  const today=todayStr(),cur=settings.mode;let evCh=false,tCh=false;const WINDOW=120;
  const cap=ymd(new Date(Date.now()-WINDOW*86400000));
  tasks.filter(t=>t.mode===cur&&t.repeat&&(t.level==="2"||t.level==="3")).forEach(t=>{
    const anchor=t.date||"", created=(t.created||"").slice(0,10)||today;
    const base=(anchor&&anchor>created)?anchor:created;              // never count occurrences before the task existed here (imported = created today)
    const dones=events.filter(e=>e.task_id===t.id&&e.kind==="done"&&e.mode===cur).map(e=>e.date).sort();
    const lastDone=dones.length?dones[dones.length-1]:null;
    const ref=lastDone||base;
    const cycleEnd = t.level==="3" ? addDays(ref,7)
                    : (t.repeat==="m" ? addMonths(ref,1) : t.repeat==="y" ? addYears(ref,1) : addDays(ref, t.repeat==="2w"?14:3));
    const shouldSkip = today>=cycleEnd;
    if(shouldSkip && t.skipped!=="1"){                               // abandoned a full cycle -> skip
      t.skipped="1";t.skipStart=base;t.skipEnd=today;tCh=true;
      events.push({id:uid(),task_id:t.id,level:t.level,date:today,kind:"skip",mode:cur,timer:"0",played_at:"",elapsed_sec:"0",created:new Date().toISOString()});evCh=true;
    }else if(!shouldSkip && t.skipped==="1"){                        // heal wrongly-skipped (e.g. imported recurring)
      t.skipped="0";t.skipStart="";t.skipEnd="";tCh=true;
      events=events.filter(e=>!(e.task_id===t.id&&e.kind==="skip"&&e.mode===cur));evCh=true;
    }
    if(t.skipped==="1")return;
    let from=base<cap?cap:base,d=new Date(from+"T00:00");            // misses only from the baseline forward
    while(true){const ds=ymd(d);if(ds>=today)break;
      if(ds>=base&&occursOn(t,ds,weekdayIdxOf(ds))){
        if(!events.some(e=>e.task_id===t.id&&e.date===ds&&e.mode===cur&&(e.kind==="done"||e.kind==="miss"))){events.push(missEvent(t,ds));evCh=true;}
      }
      d.setDate(d.getDate()+1);
    }
  });

}

function nextOccurrence(t){const today=todayStr();let d=new Date(today+"T00:00");
  for(let i=0;i<400;i++){const ds=ymd(d);if(ds>=(t.date||"")&&occursOnRaw(t,ds,weekdayIdxOf(ds)))return ds;d.setDate(d.getDate()+1);}return t.date||today;}

    tasks.filter(t=>t.mode===cur&&t.level!=="1"&&t.skipped!=="1"&&!seen.has(t.id)&&occursOn(t,ds,wd)).forEach(t=>{seen.add(t.id);out.push({t,d:ds});});}

function remindTick(){

   A looping near-silent audio keeps the page alive far longer when backgrounded/locked,
   and lets the end beep + vibration fire. NOTE: a browser PWA still can't guarantee
   truly non-stop background execution or an OS foreground-service notification — that
   needs a native wrapper. This is the best a web app can do. */
let keepEl=null;
function anyRunning(){for(const st of timers.values())if(st&&!st.paused&&!st.ended)return true;return false;}
function updateKeepAlive(){
  if(anyRunning()){
    if(!keepEl){const rate=8000,s=new Uint8Array(rate).fill(128);
      keepEl=new Audio(URL.createObjectURL(new Blob([wav8(rate,s)],{type:"audio/wav"})));keepEl.loop=true;keepEl.volume=0.02;}
    keepEl.play().catch(()=>{});
  }else if(keepEl){keepEl.pause();}
  updateNotif();fgUpdate();
}
let notifAsked=false;
async function updateNotif(){
  try{
    if(isNative())return;                                   // native uses the foreground service (fgUpdate), not the SW
    if(!("Notification" in window)||!navigator.serviceWorker)return;
    if(Notification.permission==="default"&&!notifAsked){notifAsked=true;try{await Notification.requestPermission();}catch(e){}}
    if(Notification.permission!=="granted")return;
    const reg=await navigator.serviceWorker.ready,running=anyRunning();
    let head,body;
    if(running){const k=[...timers.keys()].find(k=>{const st=timers.get(k);return st&&!st.paused&&!st.ended;});
      const t=k?byId(k.split("|")[0]):null;head="🟢 active";body="now: "+(t?(t.text||"task"):"running");}
    else{const up=upcomingOccurrences()[0];head="🔴 inactive";body=up?("next: "+(up.t.text||"task")+" · "+fmtDayMon(up.d)):"no upcoming task";}
    reg.showNotification("TIMER_ — "+head,{body,tag:"timer_status",silent:true,requireInteraction:running,renotify:false,
      actions:[{action:"stop",title:"close"}]});
  }catch(e){}
}
function stopAllTimers(){
  [...timers.keys()].forEach(k=>{const st=timers.get(k);if(st&&st.iv)clearInterval(st.iv);stopAudio(k);timers.delete(k);});
  updateKeepAlive();render();
}
if(navigator.serviceWorker)navigator.serviceWorker.addEventListener("message",e=>{
  if(e.data&&e.data.type==="notif-action"&&e.data.action==="stop")stopAllTimers();
});
document.addEventListener("visibilitychange",()=>{if(!document.hidden)updateNotif();});

/* ---------- NATIVE foreground service bridge (only runs inside the Capacitor wrapper; inert in a browser) ---------- */
function isNative(){return !!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());}
function FGS(){return window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.ForegroundService;}
let fgStarted=false;
function fgOpts(){
  const running=anyRunning();let body;
  if(running){const k=[...timers.keys()].find(k=>{const st=timers.get(k);return st&&!st.paused&&!st.ended;});
    const t=k?byId(k.split("|")[0]):null;body="● active — "+(t?(t.text||"task"):"running");}
  else{const up=upcomingOccurrences()[0];body="○ inactive — next: "+(up?(up.t.text||"task"):"none");}
  return {id:1,title:"TIMER_",body,smallIcon:"ic_stat_timer",buttons:[{title:"close",id:1}],silent:true,notificationChannelId:"timer"};
}
async function fgInit(){
  const F=FGS();if(!isNative()&&!nativeFs())return;
  if(!timerDir&&nativeFs())await connect();                  // native app auto-connects app storage (no picker)
  if(!F)return;
  try{await F.requestPermissions();}catch(e){}
  try{await F.createNotificationChannel({id:"timer",name:"TIMER_",description:"Timer status",importance:3});}catch(e){}
  try{F.addListener&&F.addListener("buttonClicked",ev=>{if(ev&&ev.buttonId===1)stopAllTimers();});}catch(e){}
  try{await F.startForegroundService(fgOpts());fgStarted=true;}catch(e){}   // persistent service from launch
}
async function fgUpdate(){const F=FGS();if(!isNative()||!F||!fgStarted)return;try{await F.updateForegroundService(fgOpts());}catch(e){}}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",fgInit);
else fgInit();
if(nativeFs()&&!timerDir)connect();                          // native app: connect app storage on launch
const APP_VERSION="v36";
(function stamp(){const e=document.getElementById("ver");if(e)e.textContent=APP_VERSION+" · cap:"+(window.Capacitor?"y":"n")+" fs:"+(nativeFs()?"y":"n");})();

const listEl=document.getElementById("list");
function hapt(){return window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Haptics;}
function doVibrate(pattern){                    // works in the native WebView (Haptics) and the browser (navigator.vibrate)
  const H=hapt();
  if(H){
    if(typeof pattern==="number"){H.vibrate({duration:pattern}).catch(()=>{});return;}
    let t=0;for(let i=0;i<pattern.length;i+=2){const on=pattern[i],off=pattern[i+1]||0;setTimeout(()=>H.vibrate({duration:on}).catch(()=>{}),t);t+=on+off;}
    return;
  }
  try{if(navigator.vibrate)navigator.vibrate(pattern);}catch(e){}
}
function buzz(ms){doVibrate(ms||18);}

/* ⠿ move-mode = grip drag to reorder; otherwise swipe a row ← (delete) / → (set level) */
function rowElAt(x,y){const el=document.elementFromPoint(x,y);return el?el.closest("[data-tid]"):null;}
let sw=null;   // {id, x, y, dx, dir, el}
listEl.addEventListener("pointerdown",e=>{
  const g=e.target.closest("[data-grip]");
  if(g){e.preventDefault();dragId=g.dataset.grip;snapshot();listEl.classList.add("dragging");buzz(12);render();return;}
  const row=e.target.closest("[data-tid]");
  // tap outside the armed row's action -> disarm
  if(armed && (!row||row.dataset.tid!==armed.id) && !e.target.closest("[data-act='del'],[data-act='setlvl']")){armed=null;render();}
  if(moveMode||!row)return;
  if(e.target.closest("button,select,.pick,.dur,.ck"))return;      // let controls work; swipe starts on body/text
  sw={id:row.dataset.tid,x:e.clientX,y:e.clientY,dx:0,dir:null,el:row};
});
listEl.addEventListener("pointermove",e=>{
  if(dragId){e.preventDefault();const row=rowElAt(e.clientX,e.clientY);
    if(row){const over=row.dataset.tid;if(over&&over!==dragId){const r=row.getBoundingClientRect();if(reorder(dragId,over,e.clientY>(r.top+r.height/2)))render();}}return;}
  if(!sw)return;const dx=e.clientX-sw.x,dy=e.clientY-sw.y;
  if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){e.preventDefault();sw.dx=dx;sw.dir=dx<0?"del":"lvl";
    sw.el.style.transform="translateX("+Math.max(-70,Math.min(70,dx))+"px)";
    sw.el.style.background=dx<0?"rgba(200,60,60,.14)":"rgba(70,120,200,.14)";}
},{passive:false});
["pointerup","pointercancel","pointerleave"].forEach(ev=>listEl.addEventListener(ev,()=>{

  if(sw){if(sw.el){sw.el.style.transform="";sw.el.style.background="";}
    if(Math.abs(sw.dx)>=48&&sw.dir){const inp=sw.el.querySelector("input[data-act='text']");if(inp)inp.blur();buzz(20);armed={id:sw.id,type:sw.dir};render();}

/* ---------- voice notes (mic → TIMER/audio_logs) ---------- */
let mr=null,recChunks=[],recBlob=null,recExt="webm",recIv=null,logAudio=null;
function recMime(){for(const[m,e]of[["audio/webm;codecs=opus","webm"],["audio/webm","webm"],["audio/ogg;codecs=opus","ogg"],["audio/mp4","m4a"]])
  if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return{m,e};return{m:"",e:"webm"};}
function slug(s){return (String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,24))||"task";}
window.toggleRec=async function(){
  if(mr&&mr.state==="recording"){mr.stop();return;}
  if(!navigator.mediaDevices||!window.MediaRecorder){toast("no mic support here");return;}
  let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){toast("mic permission needed");return;}
  const {m,e}=recMime();recExt=e;recChunks=[];recBlob=null;
  try{mr=new MediaRecorder(stream,m?{mimeType:m}:undefined);}catch(err){mr=new MediaRecorder(stream);}
  mr.ondataavailable=ev=>{if(ev.data&&ev.data.size)recChunks.push(ev.data);};
  mr.onstop=()=>{recBlob=new Blob(recChunks,{type:m||"audio/webm"});stream.getTracks().forEach(x=>x.stop());clearInterval(recIv);recIv=null;updateRecUI();};
  mr.start();const t0=Date.now();
  recIv=setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000);const st=document.getElementById("recStat");if(st)st.textContent="● rec "+s+"s / 30";
    if(s>=30&&mr.state==="recording")mr.stop();},250);
  updateRecUI();
};
function updateRecUI(){
  const btn=document.getElementById("recBtn"),st=document.getElementById("recStat"),pv=document.getElementById("recPrev"),cl=document.getElementById("recClr");
  if(!btn)return;const on=mr&&mr.state==="recording";
  btn.textContent=on?"■ stop":"🎤 record";btn.classList.toggle("recon",on);
  if(recBlob&&pv){pv.src=URL.createObjectURL(recBlob);pv.style.display="";if(st)st.textContent="✓ recorded";if(cl)cl.style.display="";}
  else{if(pv){pv.style.display="none";pv.removeAttribute("src");}if(cl)cl.style.display="none";if(st&&!on)st.textContent="";}
}
window.clearRec=function(){recBlob=null;recChunks=[];updateRecUI();};
window.playAudio=async function(name){try{
  if(timerDir==="native"){const b64=await nRead("audio_logs/"+name,true);if(!b64){toast("audio not found");return;}
    if(!logAudio)logAudio=new Audio();logAudio.src=URL.createObjectURL(b64ToBlob(b64,"audio/"+recExt));logAudio.play().catch(()=>{});return;}
  const dir=await getAudioDir();const f=await(await dir.getFileHandle(name)).getFile();
  if(!logAudio)logAudio=new Audio();logAudio.src=URL.createObjectURL(f);logAudio.play().catch(()=>{});}catch(e){toast("audio not found");}};

/* ---------- mode_switch (discipline stats, per-mode dataset) ---------- */
let statWin="t";
const WINMAP={t:1,"7":7,"30":30,"360":360,all:"all"},WINLBL={t:"today","7":"last 7d","30":"last 30d","360":"last 360d",all:"all time"};
function openStats(){
  const disc = settings.mode==="discipline", today=todayStr(), cur=settings.mode;
  // ratio of checked occurrences for one level on one day
  const dayLevelRatio=(D,L)=>{
    const dn=events.filter(e=>e.mode===cur&&e.level===L&&e.date===D&&e.kind==="done").length;
    const ms=events.filter(e=>e.mode===cur&&e.level===L&&e.date===D&&e.kind==="miss").length;
    let open=0;
    if(D===today)tasks.filter(t=>t.mode===cur&&t.level===L&&t.skipped!=="1"&&occursOn(t,today,weekdayIdxOf(today))).forEach(t=>{if(!eventFor(t.id,today))open++;});
    const tot=dn+ms+open;return tot?dn/tot:null;
  };
  const daySkips=D=>events.filter(e=>e.mode===cur&&e.date===D&&e.kind==="skip").length;
  // one day's TOTAL: weighted level avg (50/30/20 renormalized), then −5% per skip that day
  const dayTotal=D=>{const W={1:50,2:30,3:20};let num=0,den=0;
    [1,2,3].forEach(L=>{const r=dayLevelRatio(D,String(L));if(r!=null){num+=W[L]*r*100;den+=W[L];}});
    const sk=daySkips(D);
    if(den)return Math.max(0,Math.min(100,Math.round(num/den-5*sk)));
    return sk?Math.max(0,100-5*sk):null;};
  // window of days
  const win=WINMAP[statWin];let start;
  if(win==="all"){const ds=events.filter(e=>e.mode===cur&&e.date).map(e=>e.date).concat(tasks.filter(t=>t.mode===cur&&t.date).map(t=>t.date));start=ds.length?ds.sort()[0]:today;}
  else start=ymd(new Date(Date.now()-(win-1)*86400000));
  const days=[];for(let d=new Date(start+"T00:00");ymd(d)<=today;d.setDate(d.getDate()+1))days.push(ymd(d));
  const avg=a=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;
  const overall=avg(days.map(dayTotal).filter(x=>x!=null));
  const levelWin=L=>avg(days.map(D=>{const r=dayLevelRatio(D,String(L));return r==null?null:Math.round(r*100);}).filter(x=>x!=null));
  const s1=levelWin("1"),s2=levelWin("2"),s3=levelWin("3");
  const skTot=events.filter(e=>e.mode===cur&&e.kind==="skip"&&(win==="all"||e.date>=start)).length;
  const show=s=>s==null?'<span class="mut">—</span>':s+'%';
  const winBtn=(w,l)=>`<button class="${statWin===w?'sel':''}" onclick="setWin('${w}')">${l}</button>`;

  openModal(`<h3>mode_switch <span class="x"><button onclick="closeModal()">✕</button></span></h3>
    <div class="modesw"><button class="${disc?'':'sel'}" onclick="setMode('experiment')">experiment</button><button class="${disc?'sel':''}" onclick="setMode('discipline')">discipline</button></div>
    <div class="modesw win" style="margin-top:6px">${winBtn("t","t")}${winBtn("7","7")}${winBtn("30","30")}${winBtn("360","360")}${winBtn("all","all")}</div>
    <div class="hint" style="margin:6px 0">${WINLBL[statWin]}${statWin==="t"?" — the day's total (levels weighted, skips −5% each)":" — average of each day's total"}</div>

    <div class="stat"><span><b>Discipline</b> <span class="mut">(L1·50 L2·30 L3·20)</span></span><b>${overall==null?'—':overall+'%'}</b></div>
    <div class="stat"><span><span class="ldot" style="background:var(--l1)"></span>level 1 · daily <span class="mut">50%</span></span><b>${show(s1)}</b></div>
    <div class="stat"><span><span class="ldot" style="background:var(--l2)"></span>level 2 · scheduled <span class="mut">30%</span></span><b>${show(s2)}</b></div>
    <div class="stat"><span><span class="ldot" style="background:var(--l3)"></span>level 3 · quick <span class="mut">20%</span></span><b>${show(s3)}</b></div>
    <div class="stat"><span>skips in window</span><b>${skTot}${skTot?` <span class="mut">(−5% each/day)</span>`:''}</b></div>
    ${disc&&settings.discStart?`<div class="stat"><span>current streak <span class="mut">since ${fmtDM(settings.discStart)}</span></span><b>${discStreak()} days</b></div>`:''}

    <div class="mbtns" style="margin-top:12px;flex-wrap:wrap">
      ${disc?`<button class="prime" onclick="migrateToDiscipline()">migrate from experiment</button>`:''}
      ${disc?`<button onclick="openArchives()">archive list</button>`:''}
      <button class="del" onclick="${disc?'resetDiscipline()':'clearStats()'}">reset ${settings.mode}</button>
    </div>
    <div class="hint">Each <b>day</b> gets a total: the level scores (% of that level's tasks checked that day) blended L1·50 L2·30 L3·20 — renormalized across levels that had tasks — minus 5% per skip that day. A multi-day window is the <b>average of those daily totals</b>. Experiment & discipline keep <b>separate</b> tasks and data.</div>`);
}
document.getElementById("btnStats").onclick=openStats;
window.setWin=function(w){statWin=w;openStats();};
window.migrateToDiscipline=function(){
  const src=tasks.filter(t=>t.mode==="experiment");
  if(!src.length){toast("no experiment tasks");return;}
  if(!confirm("Copy all "+src.length+" experiment task(s) (every level) into discipline mode? Statistics are NOT copied — the discipline streak starts today."))return;
  src.forEach(t=>{tasks.push(normTask({id:uid(),level:t.level,text:t.text,date:t.date,hour:t.hour,dur:t.dur,
    mode:"discipline",repeat:t.repeat,sort:t.sort,gcal:t.gcal}));});
  settings.lastRoll_discipline=todayStr();settings.discStart=todayStr();   // streak + stats begin on migration day
  saveTasks();saveSettings();closeModal();render();toast("migrated "+src.length+" to discipline");
};
/* ---------- discipline run stats + archives ---------- */
function _dayLvlRatio(D,L,cur){
  const dn=events.filter(e=>e.mode===cur&&e.level===L&&e.date===D&&e.kind==="done").length;
  const ms=events.filter(e=>e.mode===cur&&e.level===L&&e.date===D&&e.kind==="miss").length;
  let open=0;const today=todayStr();
  if(D===today)tasks.filter(t=>t.mode===cur&&t.level===L&&t.skipped!=="1"&&occursOn(t,today,weekdayIdxOf(today))).forEach(t=>{if(!eventFor(t.id,today))open++;});
  const tot=dn+ms+open;return tot?dn/tot:null;
}
function _dayTot(D,cur){const W={1:50,2:30,3:20};let num=0,den=0;[1,2,3].forEach(L=>{const r=_dayLvlRatio(D,String(L),cur);if(r!=null){num+=W[L]*r*100;den+=W[L];}});
  const sk=events.filter(e=>e.mode===cur&&e.date===D&&e.kind==="skip").length;
  if(den)return Math.max(0,Math.min(100,Math.round(num/den-5*sk)));return sk?Math.max(0,100-5*sk):null;}
function runStats(startISO,cur){
  const today=todayStr(),days=[];for(let d=new Date(startISO+"T00:00");ymd(d)<=today;d.setDate(d.getDate()+1))days.push(ymd(d));
  const avg=a=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;
  const lw=L=>avg(days.map(D=>{const r=_dayLvlRatio(D,String(L),cur);return r==null?null:Math.round(r*100);}).filter(x=>x!=null));
  return {overall:avg(days.map(D=>_dayTot(D,cur)).filter(x=>x!=null)),s1:lw("1"),s2:lw("2"),s3:lw("3"),days:days.length,start:startISO,end:today};
}
function discStreak(){const s=settings.discStart;return s?Math.max(1,daysBetween(s,todayStr())+1):0;}
window.resetDiscipline=function(){

    <input id="arcn" placeholder="streak name (if saving)" style="width:100%;margin-top:8px">
    <div class="mbtns" style="flex-wrap:wrap"><button onclick="closeModal()">cancel</button><button onclick="doDiscReset(false)">don't save</button><button class="prime" onclick="doDiscReset(true)">save</button></div>`);

window.doDiscReset=function(save){

    const P=v=>v==null?"":String(v);
    archives.push({name,start:st.start,end:st.end,days:String(st.days),overall:P(st.overall),l1:P(st.s1),l2:P(st.s2),l3:P(st.s3),saved:new Date().toISOString()});
    saveArchives();

  events=events.filter(e=>e.mode!=="discipline");                        // clean stats, keep the tasks

window.clearStats=function(){
  const cur=settings.mode;
  if(!confirm("Reset ALL "+cur+" data — every task, completion and note in this mode? This is a full wipe and can't be undone."))return;

function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?h+"h "+m+"m":m+"m";}

function pickFile(accept,multiple,cb){const inp=document.createElement("input");inp.type="file";inp.accept=accept;inp.multiple=!!multiple;

function dl(name,text){const b=new Blob([text],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}

/* ---------- Google Calendar import (recurring monthly/yearly -> experiment level-2) ---------- */
let gapiToken=null;
function loadGIS(){return new Promise((res,rej)=>{
  if(window.google&&google.accounts&&google.accounts.oauth2)return res();
  const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";s.onload=()=>res();s.onerror=()=>rej(new Error("GIS load failed (no network?)"));document.head.appendChild(s);});}
window.importGCal=async function(){
  if(!settings.gcalClient){
    openModal(`<h3>Google Calendar — one-time setup <span class="x"><button onclick="closeModal()">✕</button></span></h3>
      <div class="hint">To let this app read your calendar, paste a Google <b>OAuth Client ID</b>. Create one (free) at console.cloud.google.com → APIs &amp; Services → Credentials → OAuth client ID → <b>Web application</b>, and add <b>https://alexdrnap.github.io</b> to "Authorized JavaScript origins". Enable the "Google Calendar API" for the project. Then paste the Client ID here.</div>
      <input id="gci" placeholder="xxxx.apps.googleusercontent.com" style="width:100%;margin-top:8px">
      <div class="mbtns"><button class="prime" onclick="saveGClient()">save &amp; continue</button></div>`);
    return;
  }
  toast("opening Google sign-in…");
  try{
    await loadGIS();
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:settings.gcalClient,
      scope:"https://www.googleapis.com/auth/calendar.readonly",
      callback:async(resp)=>{ if(resp&&resp.access_token){gapiToken=resp.access_token;await fetchGCal();} else toast("no access granted"); }
    });
    tc.requestAccessToken();
  }catch(e){toast(e.message||"Google sign-in failed");}
};
window.saveGClient=function(){const v=(document.getElementById("gci").value||"").trim();if(!v){toast("paste a Client ID");return;}
  settings.gcalClient=v;saveSettings();closeModal();importGCal();};
async function fetchGCal(){
  try{
    const now=new Date(),tMin=new Date(now.getFullYear()-1,0,1).toISOString();
    const url="https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=false&maxResults=2500&timeMin="+encodeURIComponent(tMin);
    const r=await fetch(url,{headers:{Authorization:"Bearer "+gapiToken}});
    if(!r.ok)throw new Error("calendar fetch "+r.status);
    const data=await r.json();
    const items=(data.items||[]).filter(it=>Array.isArray(it.recurrence)&&it.recurrence.some(x=>/FREQ=(MONTHLY|YEARLY)/i.test(x)));
    // map to level-2 task rows
    const mapped=items.map(it=>{
      const rr=it.recurrence.find(x=>/FREQ=(MONTHLY|YEARLY)/i.test(x))||"";
      const freq=/FREQ=YEARLY/i.test(rr)?"y":"m";
      const start=(it.start&&(it.start.date||it.start.dateTime))||"";
      const date=start.slice(0,10);
      const hour=(it.start&&it.start.dateTime)?new Date(it.start.dateTime).toTimeString().slice(0,5):"";
      return {gcal:it.id,text:(it.summary||"(untitled)"),date,hour,repeat:freq};
    }).filter(m=>m.date);
    // dedupe against already-imported (keep user edits, add only new gcal ids)
    const have=new Set(tasks.filter(t=>t.mode==="experiment"&&t.gcal).map(t=>t.gcal));
    const fresh=mapped.filter(m=>!have.has(m.gcal));
    if(have.size>0 && !confirm("You've imported before. Your edited tasks are kept — this only adds "+fresh.length+" new event(s). Continue?"))return;
    fresh.forEach(m=>tasks.push(normTask({id:uid(),level:"2",text:m.text,date:m.date,hour:m.hour,repeat:m.repeat,mode:"experiment",gcal:m.gcal,sort:String(tasks.length)})));
    // write the source-of-truth import csv (all currently-imported experiment L2 from google)
    const grows=tasks.filter(t=>t.mode==="experiment"&&t.gcal);
    if(timerDir)await writeFile(timerDir,GCAL_CSV,toCSV(TASK_H,grows));
    saveTasks();closeModal();render();
    toast(fresh.length?("imported "+fresh.length+" new · "+(mapped.length-fresh.length)+" kept"):("no new events · "+mapped.length+" already imported"));
  }catch(e){toast(e.message||"import failed");}
}

/* ---------- per-second tick (metronome, independent volume) ---------- */
let tickCtx=null,tickIv=null;
function ensureTick(){
  if(!tickCtx){try{tickCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(tickCtx&&tickCtx.state==="suspended")tickCtx.resume();
  if(!tickIv)tickIv=setInterval(tickPulse,1000);
}
function tickActive(){for(const st of timers.values()){if(st.paused)continue;
  if(st.dur>0){if(elapsedOf(st)<st.dur)return true;}else return true;}return false;}   // timer: only until it ends; stopwatch: while running
function tickPulse(){
  if(!settings.tickOn||!tickCtx||!tickActive())return;
  const vol=[0.025,0.12,0.24,0.34][settings.tickVol]||0.12;
  const o=tickCtx.createOscillator(),g=tickCtx.createGain();o.type="triangle";o.frequency.value=1600;
  o.connect(g);g.connect(tickCtx.destination);const t=tickCtx.currentTime;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.002);g.gain.exponentialRampToValueAtTime(0.0001,t+0.03);
  o.start(t);o.stop(t+0.05);
}
function syncTickUI(){const c=document.getElementById("tickChk"),v=document.getElementById("tickVol");
  if(c)c.checked=settings.tickOn;if(v)v.value=String(settings.tickVol);}
document.getElementById("tickChk").onchange=e=>{settings.tickOn=e.target.checked;saveSettings();if(settings.tickOn)ensureTick();};
document.getElementById("tickVol").onchange=e=>{settings.tickVol=Math.max(0,Math.min(3,+e.target.value||0));saveSettings();};

/* Service worker is for the HOSTED web/PWA version only. Inside the native
   wrapper (Capacitor) it just serves a STALE cached page and hides updates —
   so there we unregister it and wipe its caches instead. */
(function(){
  const inWrapper = !!window.Capacitor || location.hostname==="localhost" || location.protocol==="capacitor:";
  if(inWrapper){
    try{if("serviceWorker" in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});}catch(e){}
    try{if(window.caches)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});}catch(e){}
    return;
  }
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
})();
