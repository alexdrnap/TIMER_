<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TIMER_</title>
<meta name="theme-color" content="#0e0f12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TIMER_">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#0e0f12; --panel:#16181d; --panel2:#1b1e25; --line:#24272e;
    --ink:#d7dae0; --dim:#7d838f; --faint:#4a4f59;
    --l1:#e0a52b;   /* level 1 - daily anchor (amber) */
    --l2:#4a9fe0;   /* level 2 - scheduled (blue) */
    --l3:#8a8f9a;   /* level 3 - quick/volatile (grey) */
    --green:#4bbf7a; --danger:#d9534f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-size:13px;line-height:1.35}
  body{padding-bottom:40px}
  button{font-family:inherit;font-size:12px;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:5px;padding:5px 8px;cursor:pointer}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.35;cursor:default}
  input,textarea,select{font-family:inherit;font-size:12px;color:var(--ink);
    background:#101217;border:1px solid var(--line);border-radius:5px;padding:2px 5px}
  input:focus,textarea:focus{outline:1px solid var(--l2);border-color:var(--l2)}
  .mut{color:var(--dim)}

  #top{position:sticky;top:0;z-index:30;background:var(--bg)}
  header{background:var(--bg);border-bottom:1px solid var(--line);
    padding:4px 6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:1px;font-size:15px}
  .brand b{color:var(--l1)}
  .hbtns{display:flex;gap:9px;flex-wrap:wrap;margin-left:auto;align-items:center}
  .hgroup{display:inline-flex;gap:3px;align-items:center;padding:2px 4px;border-radius:7px;background:#0e1015;border:1px solid var(--line)}
  .conn{color:var(--dim);font-size:11px}.conn.ok{color:var(--green)}
  .add{color:var(--green);border-color:#2c4a38}
  .del{color:var(--danger);border-color:#4a2c2c}.del.on{background:#33191a;color:#ffb4b1}
  #btnLvl.on{background:#0f1620;color:var(--ink);outline:1px solid var(--l2)}

  .tabs{display:flex;gap:3px;padding:2px 6px 0;overflow-x:auto;border-bottom:1px solid var(--line)}
  .tab{flex:0 0 auto;padding:3px 9px;border:1px solid var(--line);border-bottom:none;border-radius:6px 6px 0 0;
    background:var(--panel);color:var(--dim);font-size:12px;position:relative;top:1px;white-space:nowrap}
  .tab.active{background:var(--panel2);color:var(--ink)}
  .tab small{display:block;font-size:9px;color:var(--faint)}
  .tab.today small{color:var(--l2)}

  .subbar{display:flex;align-items:center;gap:8px;padding:3px 6px}
  .subbar .next{color:var(--l1);border-color:#4a3a1c;padding:3px 8px}
  .count{color:var(--dim);font-size:11px}
  .tickctl{margin-left:auto;display:flex;align-items:center;gap:3px;font-size:11px;color:var(--dim)}
  .tickctl input{width:15px;height:15px;accent-color:var(--l2)}
  .tickvol{padding:1px 3px;font-size:11px}

  #list{padding:1px 6px 40px}
  .grp{margin:3px 0 1px;font-size:10px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;
    display:flex;align-items:center;gap:6px}
  .grp .dot{width:7px;height:7px;border-radius:2px}
  .grp.l1 .dot{background:var(--l1)} .grp.l2 .dot{background:var(--l2)} .grp.l3 .dot{background:var(--l3)}

  .task{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:1px 4px;margin:1px 0;position:relative;overflow:hidden}
  .task.l1{border-left:3px solid var(--l1)} .task.l2{border-left:3px solid var(--l2)} .task.l3{border-left:3px solid var(--l3)}
  .task.mode-timer{box-shadow:inset -3px 0 0 rgba(75,191,122,.55)}    /* timer = green edge */
  .task.mode-sw{box-shadow:inset -3px 0 0 rgba(217,83,79,.55)}        /* stopwatch = red edge */
  .task.done{opacity:.6}
  .task.overdue:not(.done){border-color:#5a2f2c}
  .task.dragging,.branch.dragging{outline:1px dashed var(--l2);opacity:.85;background:#12202b}
  #list.dragging{touch-action:none;user-select:none}
  .row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
  .txt{flex:1 1 40px;min-width:24px}
  .txt input{width:100%;border:1px solid var(--line);border-radius:4px;padding:1px 3px;-webkit-user-select:none;-webkit-touch-callout:none;
    background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .task.done .txt input,.branch.done .txt input{text-decoration:line-through;color:var(--dim)}
  .ck{flex:0 0 auto;width:16px;height:16px;accent-color:var(--green)}
  .exp{flex:0 0 auto;width:15px;height:22px;padding:0;border:none;background:transparent;color:var(--dim);font-size:11px}
  .play{flex:0 0 auto;width:26px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--l2);border-color:#243b4d;font-size:12px;padding:0}
  .play.running{color:var(--bg);background:var(--l2);border-color:var(--l2);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}
  .elapsed{flex:0 0 auto;font-variant-numeric:tabular-nums;color:var(--l2);font-size:11px;text-align:right}
  .elapsed.alarm{color:var(--l1);animation:pulse .7s infinite}
  .elapsed.sw{color:var(--dim);opacity:.85}
  .elapsed.paused{opacity:.5}
  .hr{flex:0 0 auto;width:84px;padding:1px 2px}
  .dur{flex:0 0 auto;width:36px;text-align:center;padding:1px 2px;background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .pick{position:relative;flex:0 0 auto;display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:4px;overflow:hidden;
    background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .pick .lbl{padding:1px 4px;font-size:12px;color:var(--ink);white-space:nowrap;pointer-events:none;text-align:center;width:100%}
  .pick input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;padding:0;margin:0}
  .dtpick{width:58px} .hrpick{width:48px}
  .carry{flex:0 0 auto;width:15px;height:15px;border-radius:50%;background:var(--danger);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .note{flex:0 0 auto;width:24px;height:22px;padding:0;color:var(--dim);font-size:12px}
  .note.has{color:var(--l1);border-color:#4a3a1c}
  .brc{flex:0 0 auto;width:26px;height:22px;padding:0;color:var(--dim);font-size:11px}
  .rst{flex:0 0 auto;width:24px;height:22px;padding:0;color:var(--dim);font-size:13px}
  .xdel{flex:0 0 auto;width:24px;height:22px;padding:0;color:var(--danger);font-size:12px}
  .lvlpick{flex:0 0 auto;display:flex;gap:2px}
  .lp{width:20px;height:22px;padding:0;font-size:11px;color:var(--dim)}
  .lp1.on{color:var(--bg);background:var(--l1);border-color:var(--l1)}
  .lp2.on{color:var(--bg);background:var(--l2);border-color:var(--l2)}
  .lp3.on{color:var(--bg);background:var(--l3);border-color:var(--l3)}
  .grip{flex:0 0 auto;margin-left:auto;width:34px;height:24px;display:flex;align-items:center;justify-content:center;
    color:var(--l2);font-size:16px;cursor:grab;touch-action:none;border:1px solid #243b4d;border-radius:5px;background:#12202b}
  .task.frozen,.branch.frozen{opacity:.72}
  .task.frozen input,.task.frozen button,.branch.frozen input,.branch.frozen button{pointer-events:none}
  .frozenbar{background:#241a10;border:1px solid #4a3a1c;color:var(--l1);border-radius:6px;padding:3px 8px;font-size:11px;margin:2px 0}
  #btnMove.on{background:#12202b;color:var(--l2);outline:1px solid var(--l2)}
  #btnPrevWk,#btnNextWk{width:24px;padding:0;color:var(--dim)}
  .tag{font-size:10px;border-radius:4px;padding:0 4px}
  .tag.over{color:#ff9b96;border:1px solid #5a2f2c}
  .empty{color:var(--faint);text-align:center;padding:24px 10px;font-size:12px}
  .dmy{width:104px;text-align:center}
  .branches{margin:1px 0 1px 12px;border-left:1px dashed var(--line);padding-left:6px}
  .branch{display:flex;flex-wrap:nowrap;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 4px;margin:1px 0;overflow:hidden}
  .branch.done{opacity:.55}
  .branch .txt input{width:100%;border:1px solid var(--line);border-radius:4px;padding:1px 3px;
    background-color:#0d0f13;background-image:repeating-linear-gradient(45deg,rgba(150,156,170,.13) 0 1px,transparent 1px 5px)}
  .branch.done .txt input{text-decoration:line-through;color:var(--dim)}
  .pmenu{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:5px;box-shadow:0 6px 18px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:4px;min-width:150px}
  .pmenu .ph{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;padding:2px 4px}
  .pmenu button{text-align:left}
  .pmenu .p1{border-left:3px solid var(--l1)} .pmenu .p2{border-left:3px solid var(--l2)} .pmenu .p3{border-left:3px solid var(--l3)}
  .pmenu .sel{background:#0f1620;outline:1px solid var(--l2)}
  .pmenu #pmDate{margin:2px 0}
  .pmenu #pmClose{margin-top:4px;color:var(--dim)}
  #toast{position:fixed;left:50%;bottom:58px;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--line);color:var(--ink);padding:7px 12px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:70;white-space:nowrap}
  #toast.on{opacity:1}
  .l1row{display:flex;justify-content:space-between;align-items:center;gap:8px;border-bottom:1px solid var(--line);padding:5px 2px}
  .l1t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
  .l1w{display:flex;align-items:center;gap:3px;flex:0 0 auto}
  .wd{width:9px;height:9px;border-radius:2px;background:#2a2e36;display:inline-block}
  .wd.on{background:var(--l1)} .wd.td{outline:1px solid var(--l2);outline-offset:1px}
  .l1c{font-size:11px;color:var(--dim);margin-left:5px;font-variant-numeric:tabular-nums} .l1c.ok{color:var(--green)}
  .l1o{font-size:11px;color:var(--l2);margin-left:6px;min-width:32px;text-align:right}
  .l1s{font-size:11px;color:var(--dim);margin-left:6px}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;align-items:flex-start;justify-content:center;padding:26px 10px;overflow:auto}
  .modal.on{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:10px;width:100%;max-width:460px;padding:12px}
  .sheet h3{margin:0 0 8px;font-size:14px;letter-spacing:.5px}
  .sheet h3 .x{float:right}
  .addbtn{display:flex;gap:8px;flex-direction:column}
  .addbtn button{text-align:left;padding:10px;font-size:13px}
  .addbtn .k{font-weight:700} .addbtn .d{color:var(--dim);font-size:11px}
  .a1{border-left:3px solid var(--l1)} .a2{border-left:3px solid var(--l2)} .a3{border-left:3px solid var(--l3)}
  .logrow{border:1px solid var(--line);border-radius:6px;padding:7px 8px;margin:6px 0;background:var(--panel2);cursor:pointer}
  .logrow .when{color:var(--dim);font-size:11px}
  .logrow .lv{float:right;font-size:10px}
  .lv1{color:var(--l1)} .lv2{color:var(--l2)} .lv3{color:var(--l3)}
  .logdetail{white-space:pre-wrap;background:#101217;border:1px solid var(--line);border-radius:6px;padding:8px;margin-top:6px;font-size:12px}
  .stat{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 2px}
  .stat b{font-variant-numeric:tabular-nums}
  .lvhead{margin:12px 2px 4px;font-size:11px;letter-spacing:.5px}
  .bars{display:flex;align-items:flex-end;gap:4px;height:76px;margin:10px 2px 4px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;justify-content:flex-end;height:100%}
  .bar .b{width:100%;border-radius:3px 3px 0 0;min-height:2px;background:var(--l2)}
  .bar .l,.bar .v{font-size:9px;color:var(--dim)}
  .np{border:1px solid var(--line);border-radius:6px;padding:7px 8px;margin:6px 0;background:var(--panel2)}
  .np .h{color:var(--l2)}
  .note-in{width:100%;min-height:80px;margin-top:6px}
  .recrow{display:flex;align-items:center;gap:8px;margin-top:8px}
  .recrow #recBtn.recon{background:#33191a;color:#ffb4b1;border-color:#5a2f2c}
  .modesw{display:flex;margin:2px 0;border:1px solid var(--line);border-radius:6px;overflow:hidden;width:fit-content}
  .modesw button{border:none;border-radius:0;background:var(--panel2);color:var(--dim);padding:6px 14px}
  .modesw button.sel{background:#0f1620;color:var(--ink);box-shadow:inset 0 -2px 0 var(--l2)}
  .del{color:var(--danger);border-color:#4a2c2c}
  .mbtns{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
  .prime{color:var(--green);border-color:#2c4a38}
  .hint{font-size:11px;color:var(--faint);margin-top:8px}
</style>
</head>
<body>

<div id="top">
<header>
  <div class="brand">TIMER<b>_</b></div>
  <div class="hbtns">
    <span class="hgroup">
      <button id="btnAdd" class="add">＋ task</button>
      <button id="btnUndo" title="undo">↶</button>
      <button id="btnRedo" title="redo">↷</button>
    </span>
    <span class="hgroup" title="edit modes">
      <button id="btnDel" class="del" title="delete tasks">🗑</button>
      <button id="btnLvl" title="set task level">①②③</button>
      <button id="btnMove" title="move / reorder tasks">⠿</button>
    </span>
    <span class="hgroup">
      <button id="btnLog">▤ log</button>
      <button id="btnStats">mode_switch</button>
    </span>
    <span class="hgroup">
      <button id="btnMore" title="data & sound">⋯</button>
      <button id="btnConnect">connect</button>
      <button id="btnReload" title="reload">⟳</button>
    </span>
    <span id="conn" class="conn">not connected</span>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="subbar">
  <button id="btnPrevWk" title="previous week">‹</button>
  <button id="btnNextWk" title="next week">›</button>
  <button class="next" id="btnNext">next ▸ future</button>
  <span class="count" id="count"></span>
  <label class="tickctl" title="per-second tick while a task runs">tick<input type="checkbox" id="tickChk"></label>
  <select id="tickVol" class="tickvol" title="tick volume">
    <option value="0">vol 1</option><option value="1">vol 2</option><option value="2">vol 3</option><option value="3">vol 4</option>
  </select>
</div>
</div>

<div id="list"></div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
"use strict";
/* ---------- constants ---------- */
const DAYLABEL=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const ONTIME_TOL=5;
const L1_TARGET=5;                       // level-1 days/week goal
const TASKS_CSV="tasks.csv", EVENTS_CSV="events.csv", NOTES_CSV="notes.csv", SETTINGS_CSV="settings.csv";
const SOUND_FILE="timer_sound.wav", BOM="\uFEFF";

/* ---------- state ---------- */
let dbDir=null,timerDir=null;
let tasks=[],events=[],notes=[];
let settings={mode:"experiment",tickOn:false,tickVol:1,lastRoll_experiment:"",lastRoll_discipline:""};
let currentDay=jsDayToIdx(new Date().getDay());
let deleteMode=false, levelMode=false, moveMode=false, weekOffset=0;
const collapsed=new Set();               // task/branch ids whose children are hidden
let dragId=null;
function byOrder(a,b){return (+a.sort)-(+b.sort);}
const DAY_MS=24*3600*1000;                // stats/notes stay editable for 24h, then lock
let audioDir=null;                        // TIMER/audio_logs handle (voice notes)
const timers=new Map();                  // runKey -> {t0,dur,before,paused,iv,playedISO}
let audioEl=null,activeKey=null,audioPrimed=false,customBuf=null,alarmURL=null;

/* ---------- date helpers ---------- */
function jsDayToIdx(d){return (d+6)%7;}                       // Sun=0 -> Mon=0
function ymd(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function todayStr(){return ymd(new Date());}
function nowHM(){return new Date().toTimeString().slice(0,5);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function weekDates(off){off=off||0;const d=new Date();const idx=jsDayToIdx(d.getDay());const mon=new Date(d);mon.setDate(d.getDate()-idx+off*7);
  const out=[];for(let i=0;i<7;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);out.push(ymd(x));}return out;}
function weekdayIdxOf(dateStr){return jsDayToIdx(new Date(dateStr+"T00:00").getDay());}
function fmtD(iso){if(!iso)return"";const p=iso.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:iso;}   // DD/MM/YYYY
function fmtDM(iso){if(!iso)return"";const p=iso.split("-");return p.length===3?p[2]+"/"+p[1]:iso;}          // DD/MM
function parseDMY(s){s=(s||"").trim();const m=s.match(/^(\d{1,2})[\/.\- ]?(\d{1,2})[\/.\- ]?(\d{2,4})$/);if(!m)return null;
  let d=+m[1],mo=+m[2],y=+m[3];if(y<100)y+=2000;if(mo<1||mo>12||d<1||d>31)return null;
  const dt=new Date(y,mo-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d)return null;return ymd(dt);}

/* ---------- CSV ---------- */
function csvEscape(v){v=(v==null?"":String(v));return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function toCSV(header,rows){let out=header.join(",")+"\n";for(const r of rows)out+=header.map(h=>csvEscape(r[h])).join(",")+"\n";return BOM+out;}
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let f="",row=[],i=0,q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(f);f="";i++;continue;}
    if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(f);rows.push(row);f="";row=[];i++;continue;}
    f+=c;i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  if(!rows.length)return[];const head=rows[0];const objs=[];
  for(let r=1;r<rows.length;r++){if(rows[r].length===1&&rows[r][0]==="")continue;
    const o={};head.forEach((h,k)=>o[h]=rows[r][k]!==undefined?rows[r][k]:"");objs.push(o);}
  return objs;
}

/* ---------- filesystem (desktop: shared folder · phone: private on-device OPFS) ---------- */
const HAS_FSA = !!window.showDirectoryPicker;
async function connect(){
  try{
    if(HAS_FSA){
      dbDir=await window.showDirectoryPicker({id:"database",mode:"readwrite"});
      timerDir=await dbDir.getDirectoryHandle("TIMER",{create:true});
    }else{
      if(!(navigator.storage&&navigator.storage.getDirectory)){setConn("no storage",false);
        alert("This browser can't store files. Update Chrome and try again.");return;}
      const root=await navigator.storage.getDirectory();               // OPFS — works on Chrome for Android
      timerDir=await root.getDirectoryHandle("TIMER",{create:true});
      if(navigator.storage.persist)navigator.storage.persist().catch(()=>{});
    }
    await loadAll();await loadSound();primeAudio();
    setConn(HAS_FSA?"✓ TIMER":"✓ on-device",true);
  }catch(e){if(e.name!=="AbortError"){console.error(e);setConn("connect failed",false);}}
}
async function readFile(dir,name){try{const h=await dir.getFileHandle(name);return await (await h.getFile()).text();}catch(e){return null;}}
async function writeFile(dir,name,text){const h=await dir.getFileHandle(name,{create:true});const w=await h.createWritable();await w.write(text);await w.close();}
async function writeBinary(dir,name,buf){const h=await dir.getFileHandle(name,{create:true});const w=await h.createWritable();await w.write(buf);await w.close();}
async function loadAll(){
  const tt=await readFile(timerDir,TASKS_CSV);tasks=tt?parseCSV(tt).map(normTask):[];

async function saveSettings(){if(timerDir)await writeFile(timerDir,SETTINGS_CSV,toCSV(["key","value"],[
  {key:"mode",value:settings.mode},{key:"tickOn",value:settings.tickOn?"1":"0"},{key:"tickVol",value:String(settings.tickVol)},
  {key:"lastRoll_experiment",value:settings.lastRoll_experiment||""},{key:"lastRoll_discipline",value:settings.lastRoll_discipline||""}]));}
function mutable(ms){return isFinite(ms) && (Date.now()-ms)<DAY_MS;}      // editable within 24h, then permanent
function eventMutable(e){return e&&mutable(Date.parse(e.created||""));}
function noteMutable(n){return n&&mutable(Date.parse((n.date||"")+"T"+(n.time||"00:00:00")));}
function normTask(o){return{id:o.id||uid(),parent:o.parent||"",level:(o.level==="1"||o.level==="2"||o.level==="3")?o.level:(o.parent?"":"3"),
  text:o.text||"",date:o.date||"",hour:o.hour||"",dur:o.dur||"",done:o.done==="1"?"1":"0",acc:o.acc||"0",
  mode:(o.mode==="discipline")?"discipline":"experiment",origin:o.origin||"",
  sort:o.sort||"0",created:o.created||new Date().toISOString()};}
const TASK_H=["id","parent","level","text","date","hour","dur","done","acc","mode","origin","sort","created"];
const EVT_H =["id","task_id","level","date","kind","mode","timer","played_at","elapsed_sec","created"];
const NOTE_H=["id","task_id","task_text","level","date","time","note","audio"];
async function saveTasks(){if(timerDir)await writeFile(timerDir,TASKS_CSV,toCSV(TASK_H,tasks));}
async function saveEvents(){if(timerDir)await writeFile(timerDir,EVENTS_CSV,toCSV(EVT_H,events));}
async function saveNotes(){if(timerDir)await writeFile(timerDir,NOTES_CSV,toCSV(NOTE_H,notes));}
async function getAudioDir(){if(!timerDir)return null;if(!audioDir)audioDir=await timerDir.getDirectoryHandle("audio_logs",{create:true});return audioDir;}

/* ---------- sound + media session ----------
   The alarm is baked as ONE media file = [silence for the remaining time] + [5s beep].
   It's played on a real <audio> element at PLAY time, so it keeps playing through a screen
   lock (like a music track) and the beep fires at the end even if JS is frozen in background. */
function getAudio(){if(!audioEl){audioEl=new Audio();audioEl.preload="auto";
    const revive=()=>{const st=timers.get(activeKey);
      if(st&&!st.paused&&!audioEl.ended&&audioEl.currentTime>0)audioEl.play().catch(()=>{});};
    ["pause","stalled","waiting","suspend"].forEach(ev=>audioEl.addEventListener(ev,revive));
  }return audioEl;}
function wav8(rate,samples){                 // 8-bit unsigned mono WAV
  const n=samples.length,buf=new Uint8Array(44+n),dv=new DataView(buf.buffer);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF");dv.setUint32(4,36+n,true);ws(8,"WAVE");ws(12,"fmt ");dv.setUint32(16,16,true);
  dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,rate,true);dv.setUint32(28,rate,true);
  dv.setUint16(32,1,true);dv.setUint16(34,8,true);ws(36,"data");dv.setUint32(40,n,true);
  buf.set(samples,44);return buf;
}
function beepSamples(rate,seconds){          // default pulsed 880Hz beep
  const n=Math.floor(rate*seconds),out=new Uint8Array(n);
  for(let i=0;i<n;i++){const t=i/rate,ph=t%0.5,on=ph<0.3?1:0,
    env=on?Math.min(1,ph/0.02,(0.3-ph)/0.02):0;
    out[i]=128+Math.round(Math.sin(2*Math.PI*880*t)*105*env);}
  return out;
}
async function customBeepSamples(rate,seconds){   // imported timer_sound.wav, looped/cut to 5s
  const n=Math.ceil(rate*seconds),oac=new OfflineAudioContext(1,n,rate);
  const s=oac.createBufferSource();s.buffer=customBuf;s.loop=true;s.connect(oac.destination);s.start(0);s.stop(seconds);
  const ch=(await oac.startRendering()).getChannelData(0),out=new Uint8Array(n);
  for(let i=0;i<n;i++){out[i]=128+Math.round(Math.max(-1,Math.min(1,ch[i]))*120);}
  return out;
}
function silentURL(){const b=wav8(8000,new Uint8Array(800).fill(128));let s="";b.forEach(x=>s+=String.fromCharCode(x));return "data:audio/wav;base64,"+btoa(s);}
async function buildAlarmURL(remaining){
  remaining=Math.max(0,Math.min(remaining,3*3600));
  const rate=remaining>1800?4000:8000,BEEP=5;
  const silN=Math.floor(remaining*rate);
  const beep=customBuf?await customBeepSamples(rate,BEEP):beepSamples(rate,BEEP);
  const data=new Uint8Array(silN+beep.length);
  data.fill(128,0,silN);                       // true silence before the beep (no audible hum)
  data.set(beep,silN);
  return URL.createObjectURL(new Blob([wav8(rate,data)],{type:"audio/wav"}));
}
async function loadSound(){                  // decode imported sound (if any) for the beep
  customBuf=null;let ab=null;
  for(const dir of[timerDir,dbDir]){if(!dir)continue;
    try{ab=await(await(await dir.getFileHandle(SOUND_FILE)).getFile()).arrayBuffer();break;}catch(e){}}
  if(ab){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();customBuf=await ctx.decodeAudioData(ab);if(ctx.close)ctx.close();}catch(e){customBuf=null;}}
}
function primeAudio(){                       // unlock playback on a gesture so the alarm can auto-play later
  if(audioPrimed)return;const a=getAudio();a.src=silentURL();a.muted=true;
  a.play().then(()=>{a.pause();a.currentTime=0;a.muted=false;audioPrimed=true;}).catch(()=>{a.muted=false;});
}
async function armAudio(key,remaining){
  const url=await buildAlarmURL(remaining);
  if(!timers.has(key)){URL.revokeObjectURL(url);return;}   // finished before it was ready
  if(alarmURL)URL.revokeObjectURL(alarmURL);alarmURL=url;
  const a=getAudio();a.loop=false;a.muted=false;a.src=url;a.currentTime=0;a.play().catch(()=>{});
  activeKey=key;setupMedia(key);
}
function stopAudio(key){
  if(key&&key!==activeKey)return;const a=getAudio();a.pause();a.currentTime=0;activeKey=null;clearMedia();
  if(alarmURL){URL.revokeObjectURL(alarmURL);alarmURL=null;}
}
function setupMedia(key){
  if(!("mediaSession" in navigator))return;
  const id=key.split("|")[0],t=byId(id);if(!t)return;
  try{navigator.mediaSession.metadata=new MediaMetadata({
    title:t.text||"task",artist:"TIMER_",album:t.parent?"branch":"level "+t.level});}catch(e){}
  navigator.mediaSession.playbackState="playing";
  const H=(a,fn)=>{try{navigator.mediaSession.setActionHandler(a,fn);}catch(e){}};
  H("play",()=>togglePause(key));H("pause",()=>togglePause(key));    // one button, pause/resume in place
  ["stop","nexttrack","previoustrack","seekbackward","seekforward","seekto"].forEach(a=>H(a,null));
}
function clearMedia(){if(!("mediaSession" in navigator))return;navigator.mediaSession.playbackState="none";
  ["play","pause","stop","nexttrack","previoustrack"].forEach(a=>{try{navigator.mediaSession.setActionHandler(a,null);}catch(e){}});}

/* ---------- timer ---------- */
function runKey(id,date){return id+"|"+date;}
function playAllowed(t,date){                       // can't start before the scheduled hour
  if(date==="b")return true;                        // branches have no schedule
  const today=todayStr();
  if(!t.hour)return date<=today;                    // no hour set -> allowed today/past
  if(date>today)return false;
  if(date<today)return true;                        // overdue -> allowed (doing it late)
  return nowHM()>=t.hour;                           // same day -> only at/after the hour
}
function play(id,date){
  const t=byId(id);if(!t)return;const key=runKey(id,date);if(timers.has(key))return;
  if(!playAllowed(t,date)){toast("starts at "+t.hour);return;}
  primeAudio();ensureTick();
  const dur=(parseFloat(t.dur)||0)*60;
  const before = dur>0 ? 0 : (parseFloat(t.acc)||0);       // stopwatch continues from stored time
  const st={t0:Date.now(),dur,before,paused:false,iv:null,playedISO:new Date().toISOString()};
  st.iv=setInterval(()=>tick(key,st),250);timers.set(key,st);
  if(dur>0)armAudio(key,dur);           // beeps 5s at the end — baked so it fires even when the screen is locked
  render();
}
function elapsedOf(st){let e=st.before+(st.paused?0:(Date.now()-st.t0)/1000);
  if(st.dur>0&&e>=st.dur)e=st.dur;                    // timer never counts past its duration
  return Math.floor(e);}
function fmtElapsed(st){const el=elapsedOf(st);
  if(st.dur>0)return el<st.dur?"-"+mmss(st.dur-el):"00:00";   // stops at 00:00, no positive count
  return mmss(el);}
function togglePause(key){
  const st=timers.get(key);if(!st)return;
  if(st.paused){                                   // resume
    st.t0=Date.now();st.paused=false;st.iv=setInterval(()=>tick(key,st),250);
    if(key===activeKey&&audioEl)audioEl.play().catch(()=>{});
    if("mediaSession" in navigator)navigator.mediaSession.playbackState="playing";
  }else{                                           // pause (in place, no rewind)
    st.before+=(Date.now()-st.t0)/1000;st.paused=true;clearInterval(st.iv);st.iv=null;
    if(key===activeKey&&audioEl)audioEl.pause();
    if(st.dur<=0){const t=byId(key.split("|")[0]);if(t){t.acc=String(Math.floor(st.before));saveTasks();}}   // stopwatch: store running total
    if("mediaSession" in navigator)navigator.mediaSession.playbackState="paused";
  }
  render();
}
function tick(key,st){
  if(st.dur>0 && !st.ended && (st.before+(Date.now()-st.t0)/1000)>=st.dur){    // reached the end
    st.ended=true;clearInterval(st.iv);st.iv=null;render();return;
  }
  const disp=document.querySelector(`.elapsed[data-run="${key}"]`);
  if(disp){disp.textContent=fmtElapsed(st);disp.classList.toggle("alarm",st.dur>0&&elapsedOf(st)>=st.dur);}
}
function mmss(s){s=Math.max(0,Math.floor(s));return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

/* ---------- done / events (per-mode datasets) ---------- */
function eventFor(id,date){return events.find(e=>e.task_id===id&&e.date===date&&e.kind==="done"&&e.mode===settings.mode);}
function missFor(id,date){return events.find(e=>e.task_id===id&&e.date===date&&e.kind==="miss"&&e.mode===settings.mode);}
function isTimerTask(t){return (parseFloat(t.dur)||0)>0;}
function markDone(id,date){
  const t=byId(id);if(!t)return;const key=runKey(id,date);const st=timers.get(key);
  if(st){clearInterval(st.iv);timers.delete(key);}
  stopAudio(key);
  const played=st?st.playedISO:"";const elapsed=st?elapsedOf(st):0;
  if(!isTimerTask(t)&&st){t.acc=String(elapsed);saveTasks();}          // stopwatch: keep the counted time
  // if a miss was recorded for this occurrence in this mode, clear it (now it's done)
  const m=missFor(id,date);if(m)events=events.filter(e=>e!==m);
  if(!eventFor(id,date)){
    events.push({id:uid(),task_id:id,level:t.level,date,kind:"done",mode:settings.mode,
      timer:isTimerTask(t)?"1":"0",played_at:played,elapsed_sec:String(elapsed),created:new Date().toISOString()});
  }
  saveEvents();render();
}
function undone(id,date){
  const ev=eventFor(id,date);
  if(ev&&!eventMutable(ev))return false;                    // locked permanent after 24h
  if(ev){events=events.filter(e=>e!==ev);saveEvents();}
  render();return true;
}
function missEvent(t,date){return {id:uid(),task_id:t.id,level:t.level,date,kind:"miss",mode:settings.mode,timer:"1",played_at:"",elapsed_sec:"0",created:new Date().toISOString()};}
function copyForward(t,date,origin){       // copy an unchecked task onto the new day
  tasks.push(normTask({id:uid(),level:t.level,text:t.text,date,hour:t.hour,dur:t.dur,mode:t.mode,origin,sort:t.sort}));
}
function rollover(){                          // new day: unchecked tasks get COPIED to the new day (originals stay); the miss stays on the old day
  const today=todayStr(),cur=settings.mode,key="lastRoll_"+cur,last=settings[key];
  let evCh=false,tCh=false;
  if(last&&last<today){
    let d=new Date(last+"T00:00");
    while(true){const ds=ymd(d);if(ds>=today)break;
      const nd=new Date(d);nd.setDate(nd.getDate()+1);const nds=ymd(nd);
      tasks.filter(t=>t.mode===cur&&t.level!=="1"&&t.date===ds).forEach(t=>{
        if(!eventFor(t.id,ds)){                                       // unchecked that day
          if(!missFor(t.id,ds)){events.push(missEvent(t,ds));evCh=true;}
          const org=t.origin||t.id;
          if(!tasks.some(x=>x.origin===org&&x.date===nds)){copyForward(t,nds,org);tCh=true;}   // carry a copy forward
        }
      });
      tasks.filter(t=>t.level==="1"&&t.mode===cur).forEach(t=>{if(!eventFor(t.id,ds)&&!missFor(t.id,ds)){events.push(missEvent(t,ds));evCh=true;}});
      d=nd;
    }
  }
  settings[key]=today;saveSettings();if(evCh)saveEvents();if(tCh)saveTasks();
}
function nextDay(iso){const d=new Date(iso+"T00:00");d.setDate(d.getDate()+1);return ymd(d);}
function catchUp(){    // any past-dated, undone task chains forward to today: a miss on each passed day + a carried copy (with the ! marker)
  const today=todayStr(),cur=settings.mode;let evCh=false,tCh=false,guard=0,changed=true;
  while(changed&&guard++<400){changed=false;
    tasks.filter(t=>t.mode===cur&&t.level!=="1"&&t.date&&t.date<today).forEach(t=>{
      if(eventFor(t.id,t.date))return;                        // done on that day -> stop the chain
      if(!missFor(t.id,t.date)){events.push(missEvent(t,t.date));evCh=true;}
      const org=t.origin||t.id,nd=nextDay(t.date);
      if(!tasks.some(x=>x.origin===org&&x.date===nd)){copyForward(t,nd,org);tCh=true;changed=true;}
    });
  }
  if(evCh)saveEvents();if(tCh)saveTasks();
}

/* ---------- undo / redo (structural: add / delete / reset) ---------- */
let undoStack=[],redoStack=[];
function snapshot(){undoStack.push(JSON.stringify(tasks));if(undoStack.length>40)undoStack.shift();redoStack=[];}
function doUndo(){if(!undoStack.length){toast("nothing to undo");return;}
  redoStack.push(JSON.stringify(tasks));tasks=JSON.parse(undoStack.pop()).map(normTask);saveTasks();render();}
function doRedo(){if(!redoStack.length){toast("nothing to redo");return;}
  undoStack.push(JSON.stringify(tasks));tasks=JSON.parse(redoStack.pop()).map(normTask);saveTasks();render();}

/* ---------- task ops ---------- */
function byId(id){return tasks.find(t=>t.id===id);}
function addTask(){                                        // new task defaults to level 3
  snapshot();weekOffset=0;
  const t=normTask({id:uid(),level:"3",text:"",date:todayStr(),hour:"",mode:settings.mode,sort:String(tasks.length)});
  tasks.push(t);saveTasks();currentDay=jsDayToIdx(new Date().getDay());render();
  setTimeout(()=>{const el=document.querySelector(`.txt input[data-id="${t.id}"]`);if(el)el.focus();},40);
}
function setLevel(id,lvl){
  const t=byId(id);if(!t)return;t.level=lvl;
  if(lvl==="1")t.date=""; else if(!t.date)t.date=todayStr();
  saveTasks();render();
}
function resetTask(id){const t=byId(id);if(!t)return;snapshot();
  [...timers.keys()].filter(k=>k.split("|")[0]===id).forEach(k=>{const st=timers.get(k);if(st&&st.iv)clearInterval(st.iv);timers.delete(k);stopAudio(k);});
  t.dur="";t.hour="";t.acc="0";saveTasks();render();}          // keeps the text field
const MON=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
function fmtDayMon(iso){const p=(iso||"").split("-");return p.length===3?(+p[2])+" "+MON[(+p[1])-1]:iso;}   // "19 jul"
function editField(id,field,val){const t=byId(id);if(!t)return;t[field]=val;saveTasks();
  if(field==="date"){catchUp();render();} else if(field==="dur"||field==="hour")render();}
function deleteTask(id){const t=byId(id);if(!t)return;
  if(t.level==="1"&&!confirm("Delete a level-1 daily anchor? Its history stays in events/notes."))return;
  snapshot();
  tasks=tasks.filter(x=>x.id!==id);saveTasks();render();}

/* ---------- reorder / level-mode / collapse / hour ---------- */
function siblingsOf(id){const t=byId(id);if(!t)return[];return tasks.filter(x=>x.mode===t.mode&&x.level===t.level);}
function reorder(dragId,targetId,after){
  const d=byId(dragId),tg=byId(targetId);if(!d||!tg||dragId===targetId)return false;
  if(d.mode!==tg.mode||d.level!==tg.level)return false;      // same level group only
  let ids=siblingsOf(dragId).slice().sort(byOrder).map(x=>x.id).filter(x=>x!==dragId);
  let ti=ids.indexOf(targetId);if(ti<0)return false;if(after)ti++;
  ids.splice(ti,0,dragId);
  ids.forEach((x,i)=>{byId(x).sort=String(i);});
  return true;
}
function parseHM(s){s=(s||"").trim();if(!s)return "";                  // empty clears the hour
  let m=s.match(/^(\d{1,2}):?(\d{2})$/);if(!m)m=s.match(/^(\d{1,2})$/);
  if(!m)return null;let h=+m[1],mi=m[2]!==undefined?+m[2]:0;
  if(h>23||mi>59)return null;return String(h).padStart(2,"0")+":"+String(mi).padStart(2,"0");}

/* ---------- render ---------- */
function setConn(txt,ok){const c=document.getElementById("conn");c.textContent=txt;c.classList.toggle("ok",!!ok);}
let FROZEN=false;                          // read-only view (past day in discipline mode)
function renderTabs(){
  const wk=weekDates(weekOffset),todayStr_=todayStr(),tabs=document.getElementById("tabs");tabs.innerHTML="";
  DAYLABEL.forEach((d,i)=>{const b=document.createElement("div");
    b.className="tab"+(i===currentDay?" active":"")+(wk[i]===todayStr_?" today":"");
    b.innerHTML=d+"<small>"+fmtDM(wk[i])+"</small>";b.onclick=()=>{currentDay=i;render();};tabs.appendChild(b);});
}
function render(){
  renderTabs();
  const list=document.getElementById("list");list.innerHTML="";
  document.getElementById("btnDel").classList.toggle("on",deleteMode);
  document.getElementById("btnLvl").classList.toggle("on",levelMode);
  document.getElementById("btnMove").classList.toggle("on",moveMode);
  const wk=weekDates(weekOffset),tabDate=wk[currentDay],today=todayStr(),cur=settings.mode;
  FROZEN = (tabDate<today && cur==="discipline");           // past days are read-only in discipline mode
  const mine=t=>t.mode===cur;                               // modes are fully separate
  const l3=tasks.filter(t=>mine(t)&&t.level==="3"&&t.date===tabDate).sort(byOrder);
  const l2=tasks.filter(t=>mine(t)&&t.level==="2"&&t.date===tabDate).sort(byOrder);
  const l1=tasks.filter(t=>mine(t)&&t.level==="1").sort(byOrder);   // daily, shown on every day
  let any=l3.length+l2.length+l1.length;
  if(FROZEN){const f=document.createElement("div");f.className="frozenbar";f.textContent="🔒 past day (discipline) — read-only";list.appendChild(f);}
  if(l3.length){list.appendChild(grp("l3","level 3 · quick"));l3.forEach(t=>list.appendChild(renderTask(t,tabDate)));}
  if(l2.length){list.appendChild(grp("l2","level 2 · scheduled"));l2.forEach(t=>list.appendChild(renderTask(t,tabDate)));}
  if(l1.length){list.appendChild(grp("l1","level 1 · daily anchor"));l1.forEach(t=>list.appendChild(renderTask(t,tabDate)));}
  if(!any&&!FROZEN)list.innerHTML='<div class="empty">nothing for '+fmtDM(tabDate)+' — hit ＋ task</div>';
  else if(!any)list.appendChild(Object.assign(document.createElement("div"),{className:"empty",textContent:"no tasks on "+fmtDM(tabDate)}));
  const fut=tasks.filter(t=>mine(t)&&t.level==="2"&&t.date>today).length;
  document.getElementById("btnNext").textContent="next ▸ "+fut+" future";
  document.getElementById("count").textContent=(weekOffset?fmtDM(tabDate)+" · ":"")+any+" shown";
}
function grp(cls,label){const d=document.createElement("div");d.className="grp "+cls;d.innerHTML='<span class="dot"></span>'+label;return d;}
function byTime(a,b){if((a.date||"")!==(b.date||""))return (a.date||"")<(b.date||"")?-1:1;if(a.hour!==b.hour)return a.hour<b.hour?-1:1;return (+a.sort)-(+b.sort);}
function isOverdue(t,date){return !eventFor(t.id,date)&&(date<todayStr()||(date===todayStr()&&t.hour&&t.hour<nowHM()));}
function hasNote(id){return notes.some(n=>n.task_id===id);}
function editCluster(id){
  if(moveMode)return `<span class="grip" data-grip="${id}" title="hold & drag to reorder">⠿</span>`;
  if(deleteMode)return `<button class="xdel" data-act="del" data-id="${id}">✕</button>`;
  if(levelMode){const t=byId(id);return `<span class="lvlpick">`+
    ["1","2","3"].map(L=>`<button class="lp lp${L}${t.level===L?' on':''}" data-act="setlvl" data-id="${id}" data-l="${L}">${L}</button>`).join("")+`</span>`;}
  return `<button class="note${hasNote(id)?' has':''}" data-act="note" data-id="${id}" title="note">✎</button>`+
         `<button class="rst" data-act="reset" data-id="${id}" title="clear timer/time (keeps text)">↺</button>`;
}
function renderTask(t,occDate){
  const key=runKey(t.id,occDate),st=timers.get(key),running=!!st,paused=running&&st.paused,ended=running&&st.ended;
  const isDone = !!eventFor(t.id,occDate);
  const chkLock = (isDone && (()=>{const ev=eventFor(t.id,occDate);return ev&&!eventMutable(ev);})())||FROZEN;
  const canPlay = playAllowed(t,occDate)&&!FROZEN, isSW=!((parseFloat(t.dur)||0)>0);
  const showHour=t.level!=="3", showDate=t.level==="2";     // L2 = scheduled (date + hour); L1 = daily (hour); L3 = quick (neither)
  const simple = deleteMode||levelMode||moveMode;           // edit modes: hide play / timer / time / min
  const cls=["task","l"+t.level,isSW?"mode-sw":"mode-timer"];if(isDone)cls.push("done");if(!isDone&&!FROZEN&&isOverdue(t,occDate))cls.push("overdue");if(dragId===t.id)cls.push("dragging");if(FROZEN)cls.push("frozen");
  const wrap=document.createElement("div");
  const el=document.createElement("div");el.className=cls.join(" ");el.dataset.tid=t.id;
  el.innerHTML=`<div class="row">
    ${simple?'':`<input class="ck" type="checkbox" data-act="done" data-id="${t.id}" data-date="${occDate}" ${isDone?"checked":""} ${chkLock?"disabled":""} title="${chkLock?'locked':'done'}">`}
    ${(!simple&&t.origin&&!isDone)?'<span class="carry" title="carried over from a missed day">!</span>':''}
    <span class="txt"><input data-act="text" data-id="${t.id}" value="${escAttr(t.text)}" placeholder="task…" ${FROZEN?"disabled":""}></span>
    ${simple?'':(running?`<span class="elapsed${paused?' paused':''}${ended?' alarm':''}" data-run="${key}">${fmtElapsed(st)}</span>`
      :(isSW&&(+t.acc>0)?`<span class="elapsed sw" title="stored time">${mmss(+t.acc)}</span>`:''))}
    ${(!simple&&showDate)?`<label class="pick dtpick"><span class="lbl">${t.date?fmtDayMon(t.date):'date'}</span><input type="date" data-act="date" data-id="${t.id}" value="${escAttr(t.date)}" ${FROZEN?"disabled":""}></label>`:''}
    ${(!simple&&showHour)?`<label class="pick hrpick"><span class="lbl">${t.hour||'--:--'}</span><input type="time" data-act="hour" data-id="${t.id}" value="${escAttr(t.hour)}" ${FROZEN?"disabled":""}></label>`:''}
    ${simple?'':`<input class="dur" data-act="dur" data-id="${t.id}" value="${escAttr(t.dur)}" placeholder="min" inputmode="decimal" ${FROZEN?"disabled":""}>`}
    ${editCluster(t.id)}
    ${simple?'':(ended?`<button class="play" disabled title="time's up — check done">⏹</button>`
      :running?`<button class="play running" data-act="pause" data-id="${t.id}" data-date="${occDate}" title="${paused?'resume':'pause'}">${paused?'▶':'⏸'}</button>`
      :`<button class="play" data-act="play" data-id="${t.id}" data-date="${occDate}" ${(isDone||!canPlay)?"disabled":""} title="${!canPlay&&t.hour?('starts '+t.hour):''}">▶</button>`)}
  </div>`;
  wrap.appendChild(el);
  return wrap;
}
function escAttr(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
let toastTid=null;
function toast(msg){let el=document.getElementById("toast");
  if(!el){el=document.createElement("div");el.id="toast";document.body.appendChild(el);}
  el.textContent=msg;el.classList.add("on");clearTimeout(toastTid);toastTid=setTimeout(()=>el.classList.remove("on"),1600);}

const listEl=document.getElementById("list");
listEl.addEventListener("click",e=>{const b=e.target.closest("[data-act]");if(!b)return;
  const id=b.dataset.id,date=b.dataset.date,act=b.dataset.act;
  if(act==="play")play(id,date);
  if(act==="pause")togglePause(runKey(id,date));

});
listEl.addEventListener("change",e=>{const b=e.target.closest("[data-act]");if(!b)return;
  const id=b.dataset.id,date=b.dataset.date,act=b.dataset.act;
  if(act==="text")editField(id,"text",b.value);
  if(act==="hour")editField(id,"hour",b.value);

  if(act==="dur")editField(id,"dur",b.value.replace(/[^0-9.]/g,""));
  if(act==="done"){ if(b.checked)markDone(id,date); else if(!undone(id,date))b.checked=true; }
});

/* drag the ⠿ handle (move mode) to reorder — drop above or below the row under the finger */
function rowElAt(x,y){const el=document.elementFromPoint(x,y);return el?el.closest("[data-tid]"):null;}
listEl.addEventListener("pointerdown",e=>{
  const g=e.target.closest("[data-grip]");if(!g)return;
  e.preventDefault();dragId=g.dataset.grip;snapshot();listEl.classList.add("dragging");
  if(navigator.vibrate)navigator.vibrate(12);render();
});
listEl.addEventListener("pointermove",e=>{
  if(!dragId)return;e.preventDefault();const row=rowElAt(e.clientX,e.clientY);
  if(!row)return;const over=row.dataset.tid;if(!over||over===dragId)return;
  const r=row.getBoundingClientRect();const after=e.clientY>(r.top+r.height/2);   // lower half = drop below (lets you reach the very bottom)
  if(reorder(dragId,over,after))render();
},{passive:false});
["pointerup","pointercancel","pointerleave"].forEach(ev=>listEl.addEventListener(ev,()=>{
  if(dragId){dragId=null;listEl.classList.remove("dragging");saveTasks();render();}
}));

const modal=document.getElementById("modal"),sheet=document.getElementById("sheet");

/* ---------- voice notes (mic → TIMER/audio_logs) ---------- */
let mr=null,recChunks=[],recBlob=null,recExt="webm",recIv=null,logAudio=null;
function recMime(){for(const[m,e]of[["audio/webm;codecs=opus","webm"],["audio/webm","webm"],["audio/ogg;codecs=opus","ogg"],["audio/mp4","m4a"]])
  if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return{m,e};return{m:"",e:"webm"};}
function slug(s){return (String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,24))||"task";}
window.toggleRec=async function(){
  if(mr&&mr.state==="recording"){mr.stop();return;}
  if(!navigator.mediaDevices||!window.MediaRecorder){toast("no mic support here");return;}
  let stream;try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){toast("mic permission needed");return;}
  const {m,e}=recMime();recExt=e;recChunks=[];recBlob=null;
  try{mr=new MediaRecorder(stream,m?{mimeType:m}:undefined);}catch(err){mr=new MediaRecorder(stream);}
  mr.ondataavailable=ev=>{if(ev.data&&ev.data.size)recChunks.push(ev.data);};
  mr.onstop=()=>{recBlob=new Blob(recChunks,{type:m||"audio/webm"});stream.getTracks().forEach(x=>x.stop());clearInterval(recIv);recIv=null;updateRecUI();};
  mr.start();const t0=Date.now();
  recIv=setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000);const st=document.getElementById("recStat");if(st)st.textContent="● rec "+s+"s / 30";
    if(s>=30&&mr.state==="recording")mr.stop();},250);
  updateRecUI();
};
function updateRecUI(){
  const btn=document.getElementById("recBtn"),st=document.getElementById("recStat"),pv=document.getElementById("recPrev"),cl=document.getElementById("recClr");
  if(!btn)return;const on=mr&&mr.state==="recording";
  btn.textContent=on?"■ stop":"🎤 record";btn.classList.toggle("recon",on);
  if(recBlob&&pv){pv.src=URL.createObjectURL(recBlob);pv.style.display="";if(st)st.textContent="✓ recorded";if(cl)cl.style.display="";}
  else{if(pv){pv.style.display="none";pv.removeAttribute("src");}if(cl)cl.style.display="none";if(st&&!on)st.textContent="";}
}
window.clearRec=function(){recBlob=null;recChunks=[];updateRecUI();};
window.playAudio=async function(name){try{const dir=await getAudioDir();const f=await(await dir.getFileHandle(name)).getFile();
  if(!logAudio)logAudio=new Audio();logAudio.src=URL.createObjectURL(f);logAudio.play().catch(()=>{});}catch(e){toast("audio not found");}};

/* note editor (text and/or 30s voice) */
function openNote(id){
  const t=byId(id);mr=null;recBlob=null;recChunks=[];const prev=notes.filter(n=>n.task_id===id).reverse();
  openModal(`<h3>note — ${escAttr(t.text||"task")} <span class="x"><button onclick="closeModal()">✕</button></span></h3>
    <textarea class="note-in" id="noteIn" placeholder="how did it go? (text optional)"></textarea>
    <div class="recrow"><button id="recBtn" onclick="toggleRec()">🎤 record</button><span id="recStat" class="mut"></span><button id="recClr" onclick="clearRec()" style="display:none">clear</button></div>
    <audio id="recPrev" controls style="display:none;width:100%;margin-top:6px"></audio>
    <div class="mbtns"><button class="prime" onclick="saveNote('${id}')">save note</button></div>
    ${prev.length?'<div class="hint">earlier notes</div>'+prev.map(n=>`<div class="logdetail">${fmtD(n.date)} ${n.time}${n.note?'\n'+escAttr(n.note):''}${n.audio?`\n<button onclick="playAudio('${escAttr(n.audio)}')">▶ audio</button>`:''}</div>`).join(''):''}`);
  setTimeout(()=>{const n=document.getElementById("noteIn");if(n)n.focus();},40);
}
window.saveNote=async function(id){
  const t=byId(id);const v=(document.getElementById("noteIn").value||"").trim();
  if(!v&&!recBlob){closeModal();return;}
  const d=new Date();let audioName="";
  if(recBlob){try{const dir=await getAudioDir();
    audioName=slug(t.text)+"_"+ymd(d)+"_"+d.toTimeString().slice(0,8).replace(/:/g,"")+"."+recExt;
    await writeBinary(dir,audioName,await recBlob.arrayBuffer());}catch(e){toast("couldn't save audio");}}
  notes.push({id:uid(),task_id:id,task_text:t.text,level:t.level,date:ymd(d),time:d.toTimeString().slice(0,8),note:v,audio:audioName});
  recBlob=null;recChunks=[];saveNotes();closeModal();render();
};
window.deleteNote=async function(i){const n=notes[+i];if(!n||!noteMutable(n))return;
  if(n.audio){try{const dir=await getAudioDir();await dir.removeEntry(n.audio);}catch(e){}}
  notes=notes.filter(x=>x!==n);saveNotes();openLog();
};

/* log viewer = notes journal */
function openLog(){
  const items=[...notes].reverse();
  const rows=items.map(n=>{const i=notes.indexOf(n);return `<div class="logrow" data-i="${i}">
      <span class="lv lv${n.level}">L${n.level}</span>
      <div>${escAttr(n.task_text||"(task)")} ${n.audio?'🎙':''}</div>
      <div class="when">${fmtD(n.date)} ${n.time}</div></div>`;}).join("");
  openModal(`<h3>log (${notes.length}) <span class="x"><button onclick="closeModal()">✕</button></span></h3>
    ${notes.length?rows:'<div class="empty">no notes yet — use ✎ on a task</div>'}<div id="logDet"></div>`);
  sheet.querySelectorAll(".logrow").forEach(r=>r.onclick=()=>{const i=+r.dataset.i,n=notes[i];
    document.getElementById("logDet").innerHTML=`<div class="logdetail"><b>${escAttr(n.task_text)}</b> · L${n.level}\n${fmtD(n.date)} ${n.time}\n\n${n.note?escAttr(n.note):(n.audio?'(voice note)':'')}
      <div style="margin-top:6px">${n.audio?`<button onclick="playAudio('${escAttr(n.audio)}')">▶ play audio</button> `:''}${noteMutable(n)?`<button class="del" onclick="deleteNote(${i})">delete</button>`:'<span class="mut" style="font-size:10px">permanent (24h+)</span>'}</div></div>`;});
}
document.getElementById("btnLog").onclick=openLog;

/* next = future scheduled (level 2, date>today) */
document.getElementById("btnNext").onclick=()=>{

  const fut=tasks.filter(t=>t.level==="2"&&t.date>today).sort((a,b)=>(a.date+a.hour)<(b.date+b.hour)?-1:1);

    <div class="when mut" style="font-size:11px">${fmtD(t.date)} · ${t.hour} · ${DAYLABEL[weekdayIdxOf(t.date)]}${t.dur?' · '+t.dur+'m':''}</div></div>`).join("");
  openModal(`<h3>next — future scheduled <span class="x"><button onclick="closeModal()">✕</button></span></h3>
    ${fut.length?rows:'<div class="empty">no future level-2 tasks</div>'}

/* ---------- mode_switch (discipline stats, per-mode dataset) ---------- */
function openStats(){
  const disc = settings.mode==="discipline", today=todayStr(), wk=weekDates(), cur=settings.mode;
  const mev = events.filter(e=>e.mode===cur);                        // this mode's events (ALL tasks, timer + stopwatch)
  // per-level discipline = % of accountable tasks that are checked. accountable = done + missed (past) + today's still-open
  function levelStats(lv){
    const done=mev.filter(e=>e.level===lv&&e.kind==="done").length;
    const miss=mev.filter(e=>e.level===lv&&e.kind==="miss").length;
    let open=0;
    tasks.filter(t=>!t.parent&&t.mode===cur&&t.level===lv).forEach(t=>{
      if(lv!=="1"&&t.date!==today)return;                            // only today's live ones are still "open"
      if(!eventFor(t.id, lv==="1"?today:t.date))open++;
    });
    const total=done+miss+open;
    return {done,total,score: total?Math.round(100*done/total):null};
  }
  const L={1:levelStats("1"),2:levelStats("2"),3:levelStats("3")};
  const W={1:50,2:30,3:20};
  let num=0,den=0;[1,2,3].forEach(l=>{if(L[l].score!=null){num+=W[l]*L[l].score;den+=W[l];}});
  const overall = den?Math.round(num/den):null;                      // weighted avg, renormalized among levels that have data
  const show=s=>s==null?'<span class="mut">—</span>':s+'%';
  const line=(lv,name,w)=>`<div class="stat"><span>level ${lv} · ${name} <span class="mut">${w}%</span></span><b>${show(L[lv].score)}${L[lv].total?` <span class="mut">(${L[lv].done}/${L[lv].total})</span>`:''}</b></div>`;

  const l1=tasks.filter(t=>t.level==="1"&&t.mode===cur);
  const l1rows = l1.length ? l1.map(t=>{
      const cnt=wk.filter(d=>eventFor(t.id,d)).length;
      const dots=wk.map(d=>`<span class="wd${eventFor(t.id,d)?' on':''}${d===today?' td':''}"></span>`).join("");
      return `<div class="l1row"><span class="l1t">${escAttr(t.text||"(unnamed)")}</span>
        <span class="l1w">${dots}<span class="l1c${cnt>=L1_TARGET?' ok':''}">${cnt}/7</span></span></div>`;
    }).join("") : '<div class="mut" style="font-size:11px;padding:4px 2px">no level-1 anchors yet</div>';

  openModal(`<h3>mode_switch <span class="x"><button onclick="closeModal()">✕</button></span></h3>
    <div class="modesw"><button class="${disc?'':'sel'}" onclick="setMode('experiment')">experiment</button><button class="${disc?'sel':''}" onclick="setMode('discipline')">discipline</button></div>
    <div class="hint" style="margin:0 0 8px">${disc?'Discipline mode — its own dataset; counting resumes from where you left it.':'Experiment mode — its own dataset; free to test, and clearable below.'}</div>

    <div class="stat"><span><b>Discipline</b> <span class="mut">(L1·50 L2·30 L3·20)</span></span><b>${overall==null?'—':overall+'%'}</b></div>
    ${line(1,"daily",50)}
    ${line(2,"scheduled",30)}
    ${line(3,"quick",20)}

    <div class="lvhead lv1">▮ level 1 · daily anchors — this week</div>
    ${l1rows}
    <div class="hint" style="margin-top:4px">dots = Mon→Sun done · X/7 weekly goal</div>

    ${!disc?`<div class="mbtns" style="margin-top:12px"><button class="del" onclick="clearStats()">clear ${settings.mode} data</button></div>`:''}
    <div class="hint">Discipline = the % of your tasks you check off, per level (all tasks count — timer and stopwatch alike). Each level's score blends into the total with a fixed weight — L1 50%, L2 30%, L3 20% — renormalized across the levels you actually have tasks in. Unchecked tasks copy to the next day; the miss stays on the day it was due. Experiment & discipline keep <b>separate</b> tasks and data.</div>`);
}
document.getElementById("btnStats").onclick=openStats;
window.setMode=function(m){settings.mode=(m==="discipline")?"discipline":"experiment";weekOffset=0;saveSettings();rollover();catchUp();openStats();render();};
window.clearStats=function(){
  if(settings.mode==="discipline"){toast("switch to experiment to clear");return;}
  if(!confirm("Delete ALL experiment stats data? Tasks and notes stay. This can't be undone."))return;
  events=events.filter(e=>e.mode!=="experiment");saveEvents();
  settings.lastRoll_experiment="";saveSettings();openStats();render();toast("experiment data cleared");
};
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?h+"h "+m+"m":m+"m";}

function pickFile(accept,multiple,cb){const inp=document.createElement("input");inp.type="file";inp.accept=accept;inp.multiple=!!multiple;
  inp.onchange=()=>{cb(multiple?[...inp.files]:inp.files[0]);};inp.click();}

function dl(name,text){const b=new Blob([text],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}

  dl(TASKS_CSV,toCSV(TASK_H,tasks));dl(EVENTS_CSV,toCSV(EVT_H,events));dl(NOTES_CSV,toCSV(NOTE_H,notes));toast("3 CSV files downloaded");};

  <div class="addbtn">

  </div>
  <div class="hint">${HAS_FSA
    ? "On this computer your data lives in the TIMER folder inside the database folder you connect."
    : "On phone the app stores data <b>privately on-device</b> (not a visible folder). Import your timer sound here, and use export now and then to back it up (downloads to your Downloads folder). Restore moves data from another device."}</div>`);}

/* ---------- per-second tick (metronome, independent volume) ---------- */
let tickCtx=null,tickIv=null;
function ensureTick(){
  if(!tickCtx){try{tickCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(tickCtx&&tickCtx.state==="suspended")tickCtx.resume();
  if(!tickIv)tickIv=setInterval(tickPulse,1000);
}
function tickActive(){for(const st of timers.values()){if(st.paused)continue;
  if(st.dur>0){if(elapsedOf(st)<st.dur)return true;}else return true;}return false;}   // timer: only until it ends; stopwatch: while running
function tickPulse(){
  if(!settings.tickOn||!tickCtx||!tickActive())return;
  const vol=[0.05,0.14,0.34,0.7][settings.tickVol]||0.14;
  const o=tickCtx.createOscillator(),g=tickCtx.createGain();o.type="triangle";o.frequency.value=1600;
  o.connect(g);g.connect(tickCtx.destination);const t=tickCtx.currentTime;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.002);g.gain.exponentialRampToValueAtTime(0.0001,t+0.03);
  o.start(t);o.stop(t+0.05);
}
function syncTickUI(){const c=document.getElementById("tickChk"),v=document.getElementById("tickVol");
  if(c)c.checked=settings.tickOn;if(v)v.value=String(settings.tickVol);}
document.getElementById("tickChk").onchange=e=>{settings.tickOn=e.target.checked;saveSettings();if(settings.tickOn)ensureTick();};
document.getElementById("tickVol").onchange=e=>{settings.tickVol=Math.max(0,Math.min(3,+e.target.value||0));saveSettings();};
